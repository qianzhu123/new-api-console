<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>new-api 本地控制台</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.svg') }}" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Cormorant+Garamond:wght@600&display=swap");
    :root {
      --bg: #f7f4ed;
      --panel: #fffdf8;
      --line: #eadfce;
      --line-strong: #d8c4a7;
      --text: #2a2218;
      --sub: #7a6853;
      --ok: #2f855a;
      --warn: #b7791f;
      --bad: #c53030;
      --btn: #355c7d;
      --btn2: #6b7280;
      --accent: #d4af37;
      --shadow: 0 10px 30px rgba(68, 52, 31, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans SC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 5% 5%, rgba(212, 175, 55, 0.14), transparent 40%),
        radial-gradient(circle at 95% 10%, rgba(106, 160, 125, 0.15), transparent 32%),
        linear-gradient(180deg, #fbf8f2 0%, #f7f4ed 100%);
    }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 22px 18px 26px; }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      background: linear-gradient(120deg, #fffdf8 0%, #fef9ef 100%);
      box-shadow: var(--shadow);
    }
    h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1.05;
      font-family: "Cormorant Garamond", serif;
      letter-spacing: 0.4px;
    }
    .sub { color: var(--sub); font-size: 13px; margin-top: 2px; }
    .bar { display: flex; flex-wrap: wrap; gap: 8px; }
    button {
      border: 0;
      border-radius: 9px;
      padding: 8px 13px;
      cursor: pointer;
      background: var(--btn);
      color: #fff;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      box-shadow: 0 3px 10px rgba(53, 92, 125, 0.24);
    }
    button:hover { transform: translateY(-1px); }
    button.secondary { background: var(--btn2); box-shadow: 0 3px 10px rgba(107,114,128,.2); }
    button.warn { background: var(--warn); box-shadow: 0 3px 10px rgba(183,121,31,.23); }
    button.bad { background: var(--bad); box-shadow: 0 3px 10px rgba(197,48,48,.22); }
    button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .grid { display: grid; grid-template-columns: minmax(0, 1.72fr) minmax(360px, .78fr); gap: 12px; align-items: start; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .account-table-wrap { width: 100%; overflow-x: hidden; }
    .account-table { width: 100%; min-width: 0; table-layout: fixed; }
    .account-table th,
    .account-table td { overflow: hidden; text-overflow: ellipsis; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 7px; text-align: left; vertical-align: top; }
    th { color: #503f2c; font-weight: 700; background: rgba(212,175,55,0.08); }
    tr:hover { background: rgba(106, 160, 125, 0.08); }
    tr.selected { background: rgba(53, 92, 125, 0.12); }
    tr.dragging { opacity: .55; }
    tr.drag-over-top { box-shadow: inset 0 3px 0 #355c7d; }
    tr.drag-over-bottom { box-shadow: inset 0 -3px 0 #355c7d; }
    .mono { font-family: Consolas, monospace; }
    .small { color: var(--sub); font-size: 12px; }
    .row-actions { display: flex; gap: 4px; flex-wrap: nowrap; align-items: center; }
    .row-actions button { padding: 5px 6px; font-size: 12px; min-width: 40px; }
    .tag { display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
    .tag.ok { background: rgba(47,133,90,.14); color: #1f6b46; }
    .tag.off { background: rgba(197,48,48,.14); color: #9b2c2c; }
    .tag.run { background: rgba(183,121,31,.14); color: #975a16; }
    .group-row { background: rgba(212,175,55,0.10); cursor: pointer; }
    .group-row:hover { background: rgba(212,175,55,0.16); }
    .group-cell { padding: 12px 7px; overflow: visible !important; }
    .group-box { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .group-main { display:grid; grid-template-columns: 30px minmax(0, 1fr); gap:8px 10px; align-items:center; min-width:0; }
    .group-url { font-weight:700; word-break:break-all; }
    .group-stats { grid-column: 2; display:flex; gap:7px; flex-wrap:wrap; color: var(--sub); font-size: 12px; }
    .group-stat { display:inline-flex; font-weight:600; }
    .group-actions { display:flex; gap:6px; flex-wrap:nowrap; justify-content:flex-end; flex-shrink:0; }
    .group-actions button { padding:5px 8px; font-size:12px; }
    .fold-btn { width:28px; height:28px; padding:0; border-radius:999px; }
    .status-short { white-space: nowrap; }
    .list-tools {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .sort-tools { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .sort-tools select { width: 150px; height: 34px; padding: 6px 8px; }
    .sort-tools button { padding: 7px 10px; }
    .drag-handle {
      cursor: grab;
      user-select: none;
      font-size: 16px;
      line-height: 1;
      color: #8a6d3b;
      text-align: center;
      width: 20px;
    }
    tr.dragging .drag-handle { cursor: grabbing; }
    .form-group { margin-bottom: 9px; }
    label { display: block; margin-bottom: 5px; color: var(--sub); font-size: 12px; font-weight: 600; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #d7c5ab;
      border-radius: 8px;
      padding: 8px;
      background: #fffefb;
      color: var(--text);
      font-size: 13px;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #b08b2f;
      box-shadow: 0 0 0 3px rgba(212,175,55,0.22);
    }
    textarea { min-height: 84px; resize: vertical; }
    .inline { display: flex; align-items: center; gap: 8px; }
    .inline input[type="checkbox"] { width: auto; accent-color: #355c7d; }
    .log {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 8px;
      max-height: 190px;
      overflow: auto;
      background: #fffefb;
      font-size: 12px;
    }
    .log-item { margin-bottom: 6px; }
    .ok { color: var(--ok); }
    .warn2 { color: var(--warn); }
    .bad2 { color: var(--bad); }
    .status-line {
      margin-top: 8px;
      color: #5f4e3b;
      font-size: 12px;
      min-height: 18px;
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 7px;
      padding: 2px 8px;
    }
    .detail-hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      padding: 14px;
      background:
        radial-gradient(circle at top right, rgba(212, 175, 55, 0.18), transparent 28%),
        linear-gradient(135deg, #fffdfa 0%, #fff6e6 100%);
      box-shadow: 0 14px 34px rgba(91, 67, 35, 0.1);
    }
    .detail-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: translateX(-120%);
      opacity: 0;
      pointer-events: none;
    }
    .detail-hero.flash::after {
      opacity: 1;
      animation: heroSweep 1s ease;
    }
    @keyframes heroSweep {
      from { transform: translateX(-120%); }
      to { transform: translateX(120%); }
    }
    .hero-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }
    .hero-name {
      font-size: 27px;
      line-height: 1;
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .hero-email {
      color: var(--sub);
      font-size: 12px;
      word-break: break-all;
    }
    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(176,139,47,.2);
      white-space: normal;
      word-break: break-word;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .metric-card {
      border: 1px solid rgba(176,139,47,.22);
      border-radius: 12px;
      background: rgba(255,255,255,0.74);
      padding: 10px;
      min-height: 88px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .metric-label {
      color: var(--sub);
      font-size: 12px;
      font-weight: 600;
    }
    .metric-value {
      font-size: 24px;
      line-height: 1.05;
      font-weight: 700;
      color: #2d3748;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .metric-positive { color: var(--ok); }
    .metric-negative { color: var(--bad); }
    .metric-neutral { color: #5f4e3b; }
    .toast-stack {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      min-width: 260px;
      max-width: 380px;
      border-radius: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,.6);
      box-shadow: 0 18px 40px rgba(56, 42, 23, 0.16);
      backdrop-filter: blur(10px);
      color: #fff;
      animation: toastIn .22s ease;
    }
    .toast.ok { background: rgba(47,133,90,.92); }
    .toast.warn2 { background: rgba(183,121,31,.92); }
    .toast.bad2 { background: rgba(197,48,48,.92); }
    .toast-title { font-weight: 700; margin-bottom: 4px; font-size: 13px; }
    .toast-body { font-size: 12px; opacity: .96; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-8px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .busy-button {
      position: relative;
      padding-left: 28px !important;
    }
    .busy-button::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 50%;
      width: 10px;
      height: 10px;
      margin-top: -6px;
      border: 2px solid rgba(255,255,255,.55);
      border-top-color: #fff;
      border-radius: 999px;
      animation: spin .7s linear infinite;
    }
    .input-invalid {
      border-color: #c53030 !important;
      box-shadow: 0 0 0 3px rgba(197, 48, 48, 0.16) !important;
    }
    .modal-shell {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(42, 34, 24, 0.45);
      backdrop-filter: blur(10px);
      z-index: 9998;
    }
    .modal-shell.open { display: flex; }
    .modal-card {
      width: min(680px, 100%);
      border: 1px solid rgba(216, 196, 167, 0.7);
      border-radius: 20px;
      padding: 18px;
      background:
        radial-gradient(circle at top right, rgba(212, 175, 55, 0.18), transparent 28%),
        linear-gradient(135deg, #fffdfa 0%, #fff6e6 100%);
      box-shadow: 0 24px 60px rgba(47, 34, 18, 0.2);
      animation: toastIn .22s ease;
    }
    .modal-title { margin: 0 0 4px; font-size: 24px; font-family: "Cormorant Garamond", serif; }
    .modal-sub { color: var(--sub); font-size: 12px; margin-bottom: 14px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-grid .span-2 { grid-column: 1 / -1; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
    .modal-error { margin-top: 10px; min-height: 18px; color: var(--bad); font-size: 12px; }
    .combo-wrap { position: relative; }
    .combo-wrap input {
      height: 38px;
      padding-right: 46px;
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,253,248,.96));
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .combo-wrap input:focus {
      background: #fffefb;
    }
    .combo-toggle {
      position: absolute;
      right: 7px;
      top: 25px;
      width: 30px;
      height: 30px;
      padding: 0;
      border-radius: 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #5f4e3b;
      background: linear-gradient(135deg, #fffaf0 0%, #ead7af 100%);
      border: 1px solid rgba(216,196,167,.95);
      box-shadow: 0 5px 14px rgba(68, 52, 31, 0.10);
      font-size: 16px;
      line-height: 1;
    }
    .combo-toggle:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #fffdf8 0%, #dfc17b 100%);
      box-shadow: 0 8px 18px rgba(68, 52, 31, 0.14);
    }
    .combo-list {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 40;
      background:
        radial-gradient(circle at top right, rgba(212,175,55,.13), transparent 36%),
        linear-gradient(180deg, rgba(255,253,248,.99), rgba(255,249,237,.99));
      border: 1px solid rgba(216,196,167,.95);
      border-radius: 16px;
      box-shadow: 0 18px 42px rgba(68, 52, 31, 0.18);
      max-height: 230px;
      overflow: auto;
      display: none;
      padding: 7px;
      backdrop-filter: blur(12px);
    }
    .combo-list.open { display: block; animation: comboIn .14s ease; }
    .combo-list::before {
      content: "本地地址";
      display: block;
      margin: 2px 4px 6px;
      padding: 0 3px;
      color: var(--sub);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .combo-list::-webkit-scrollbar { width: 8px; }
    .combo-list::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(176,139,47,.34);
      border: 2px solid rgba(255,253,248,.95);
    }
    .combo-item {
      position: relative;
      padding: 10px 11px 10px 34px;
      cursor: pointer;
      font-size: 13px;
      border-radius: 12px;
      color: #3a2d1f;
      word-break: break-all;
      display: flex;
      align-items: center;
      min-height: 38px;
      border: 1px solid transparent;
      transition: background .14s ease, border-color .14s ease, transform .14s ease, color .14s ease;
    }
    .combo-item::before {
      content: "⌁";
      position: absolute;
      left: 10px;
      top: 50%;
      width: 16px;
      height: 16px;
      transform: translateY(-50%);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #8a6d3b;
      font-size: 13px;
      background: rgba(212,175,55,.18);
      box-shadow: inset 0 0 0 1px rgba(212,175,55,.24);
    }
    .combo-item:hover, .combo-item.active {
      transform: translateX(2px);
      background: linear-gradient(90deg, rgba(212,175,55,0.18), rgba(53,92,125,0.09));
      border-color: rgba(216,196,167,.72);
      color: #2a2218;
    }
    .combo-empty {
      margin: 2px 0 0;
      padding: 12px;
      color: var(--sub);
      font-size: 12px;
      text-align: center;
      border-radius: 12px;
      background: rgba(255,255,255,.55);
      border: 1px dashed rgba(216,196,167,.75);
    }
    @keyframes comboIn {
      from { opacity: 0; transform: translateY(-4px) scale(.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .head { flex-direction: column; align-items: flex-start; }
      .modal-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 1280px) and (min-width: 981px) {
      .row-actions { gap: 3px; }
      .row-actions button { padding: 5px 5px; font-size: 11px; min-width: 36px; }
      .metric-value { font-size: 22px; }
    }
    @media (max-width: 560px) {
      .metric-grid { grid-template-columns: 1fr; }
      .metric-value { white-space: normal; overflow-wrap: anywhere; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="toast-stack" class="toast-stack"></div>
    <div class="head">
      <div>
        <h1>new-api 本地控制台</h1>
        <div class="sub">一键签到、账号状态检测、余额变化跟踪、账号/API Key 管理</div>
      </div>
      <div class="bar">
        <button id="btn-refresh" class="secondary">刷新账号</button>
        <button id="btn-checkin-all">全部签到</button>
        <button id="btn-status-all" class="secondary">全部检测</button>
        <button id="btn-new" class="warn">添加账号</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="list-tools">
          <div class="small">地址分组列表</div>
          <div class="sort-tools" aria-label="账号排序">
            <select id="sort-field" title="排序字段">
              <option value="manual">手动排序</option>
              <option value="new_api_user">new_api_user</option>
              <option value="quota">额度</option>
            </select>
            <button id="btn-sort-dir" class="secondary" type="button" title="切换升降序">降序</button>
            <button id="btn-apply-sort" class="warn" type="button">排序</button>
          </div>
        </div>
        <div class="account-table-wrap">
          <table class="account-table">
            <colgroup>
              <col style="width:4%;">
              <col style="width:6%;">
              <col style="width:17%;">
              <col style="width:9%;">
              <col style="width:13%;">
              <col style="width:13%;">
              <col style="width:10%;">
              <col style="width:28%;">
            </colgroup>
            <thead>
              <tr>
                <th aria-label="排序"></th>
                <th>序号</th>
                <th>账号名</th>
                <th>状态</th>
                <th>new_api_user</th>
                <th>今日签到状态</th>
                <th>状态结果</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="account-body"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3 id="panel-title" style="margin-top:0;">账号详情</h3>

        <div id="detail-empty" class="small">点击左侧账号查看详情。</div>
        <div id="detail-content" style="display:none;">
          <div id="detail-status" class="detail-hero"></div>
        </div>

        <hr style="border-color:var(--line); margin:12px 0;">
        <h3 style="margin-top:0;">账号编辑</h3>
        <div class="small" style="margin-bottom:10px;">可在左侧列表调整排序，序号会自动更新显示。</div>
        <div id="edit-panel">
          <div class="form-group">
            <label for="f-name">账号名</label>
            <input id="f-name" />
          </div>
          <div class="form-group combo-wrap">
            <label for="f-base-url">域名地址(base_url)</label>
            <input id="f-base-url" placeholder="https://example.com" autocomplete="off" />
            <button type="button" class="combo-toggle" data-combo-target="f-base-url" aria-label="展开本地地址列表">⌄</button>
            <div id="f-base-url-list" class="combo-list" role="listbox"></div>
          </div>
          <div class="form-group">
            <label for="f-user">new_api_user</label>
            <input id="f-user" />
          </div>
          <div class="form-group">
            <label for="f-session">Session</label>
            <textarea id="f-session"></textarea>
          </div>
          <div class="form-group">
            <label for="f-keys">API Key（每行一个）</label>
            <textarea id="f-keys"></textarea>
          </div>
          <div class="form-group inline">
            <input type="checkbox" id="f-enabled" checked />
            <label for="f-enabled" style="margin:0;">启用账号</label>
          </div>

          <div class="bar">
            <button id="btn-save">保存</button>
            <button id="btn-cancel" class="secondary">取消</button>
            <button id="btn-delete" class="bad">删除</button>
          </div>
        </div>
        <div class="status-line" id="busy-line"></div>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>

  <div id="add-modal" class="modal-shell" aria-hidden="true">
    <div class="modal-card">
      <h3 class="modal-title">添加账号</h3>
      <div class="modal-sub">域名地址可直接输入，也可以选择本地已有地址。</div>

      <div class="modal-grid">
        <div class="form-group">
          <label for="m-name">账号名</label>
          <input id="m-name" />
        </div>
        <div class="form-group combo-wrap">
          <label for="m-base-url">域名地址(base_url)</label>
          <input id="m-base-url" placeholder="https://example.com" autocomplete="off" />
          <button type="button" class="combo-toggle" data-combo-target="m-base-url" aria-label="展开本地地址列表">⌄</button>
          <div id="m-base-url-list" class="combo-list" role="listbox"></div>
        </div>
        <div class="form-group">
          <label for="m-user">new_api_user</label>
          <input id="m-user" inputmode="numeric" />
        </div>
        <div class="form-group span-2">
          <label for="m-session">Session</label>
          <textarea id="m-session"></textarea>
        </div>
        <div class="form-group span-2">
          <label for="m-keys">API Key（每行一个）</label>
          <textarea id="m-keys"></textarea>
        </div>
        <div class="form-group span-2 inline">
          <input type="checkbox" id="m-enabled" checked />
          <label for="m-enabled" style="margin:0;">立即启用该账号</label>
        </div>
      </div>

      <div id="modal-error" class="modal-error"></div>

      <div class="modal-actions">
        <button id="btn-modal-cancel" class="secondary">取消</button>
        <button id="btn-modal-save">创建账号</button>
      </div>
    </div>
  </div>

<script>
const state = {
  accounts: [],
  selected: null,
  editingAccountKey: null,
  defaultBaseUrl: 'https://www.new-api.com',
  knownBaseUrls: [],
  checkinResults: {},
  signinStatus: {},
  statusResults: {},
  systemStatus: null,
  pendingGlobal: false,
  pendingAccounts: {},
  dragKey: null,
  collapsedGroups: {},
  sortField: 'manual',
  sortDir: 'desc',
};

const el = {
  body: document.getElementById('account-body'),
  detailEmpty: document.getElementById('detail-empty'),
  detailContent: document.getElementById('detail-content'),
  detailStatus: document.getElementById('detail-status'),
  toastStack: document.getElementById('toast-stack'),
  panelTitle: document.getElementById('panel-title'),
  fName: document.getElementById('f-name'),
  fBaseUrl: document.getElementById('f-base-url'),
  fUser: document.getElementById('f-user'),
  fSession: document.getElementById('f-session'),
  fKeys: document.getElementById('f-keys'),
  fEnabled: document.getElementById('f-enabled'),
  addModal: document.getElementById('add-modal'),
  mName: document.getElementById('m-name'),
  mBaseUrl: document.getElementById('m-base-url'),
  mUser: document.getElementById('m-user'),
  mSession: document.getElementById('m-session'),
  mKeys: document.getElementById('m-keys'),
  mEnabled: document.getElementById('m-enabled'),
  modalError: document.getElementById('modal-error'),
  btnModalSave: document.getElementById('btn-modal-save'),
  btnModalCancel: document.getElementById('btn-modal-cancel'),
  log: document.getElementById('log'),
  busy: document.getElementById('busy-line'),
  btnRefresh: document.getElementById('btn-refresh'),
  btnCheckinAll: document.getElementById('btn-checkin-all'),
  btnStatusAll: document.getElementById('btn-status-all'),
  btnNew: document.getElementById('btn-new'),
  sortField: document.getElementById('sort-field'),
  btnSortDir: document.getElementById('btn-sort-dir'),
  btnApplySort: document.getElementById('btn-apply-sort'),
  fBaseUrlList: document.getElementById('f-base-url-list'),
  mBaseUrlList: document.getElementById('m-base-url-list'),
};

function log(msg, cls = '') {
  const ts = new Date().toLocaleString();
  const div = document.createElement('div');
  div.className = `log-item ${cls}`;
  div.textContent = `[${ts}] ${msg}`;
  el.log.prepend(div);
}

function notify(cls, title, body = '') {
  const div = document.createElement('div');
  div.className = `toast ${cls || 'ok'}`;
  div.innerHTML = `<div class="toast-title">${title}</div><div class="toast-body">${body || ''}</div>`;
  el.toastStack.appendChild(div);
  window.setTimeout(() => {
    div.style.opacity = '0';
    div.style.transform = 'translateY(-6px) scale(.98)';
  }, 3200);
  window.setTimeout(() => div.remove(), 3600);
}

function setBusyText(text = '') { el.busy.textContent = text; }

function api(path, opts = {}) {
  return fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts }).then(async (r) => {
    const data = await r.json().catch(() => ({ ok: false, error: '响应不是有效JSON' }));
    if (!r.ok || data.ok === false) throw new Error(data.error || `HTTP ${r.status}`);
    return data;
  });
}

function quoteText(v) { return (v ?? '').toString(); }
function getQuotaPerUnit(sys) { const n = Number(sys?.quota_per_unit); return Number.isFinite(n) && n > 0 ? n : null; }
function getMoneySymbol(sys) { const displayType = quoteText(sys?.quota_display_type).toUpperCase(); if (displayType === 'USD') return '$'; return quoteText(sys?.custom_currency_symbol) || '$'; }
function quotaToMoney(rawQuota, sys) { const q = Number(rawQuota); const unit = getQuotaPerUnit(sys); if (!Number.isFinite(q) || !unit) return null; return q / unit; }
function formatMoney(v, sys, withSign = false) { if (!Number.isFinite(v)) return '-'; const symbol = getMoneySymbol(sys); const sign = withSign ? (v >= 0 ? '+' : '') : ''; return `${sign}${symbol}${v.toFixed(2)}`; }
function formatShortTs(ts) { const s = quoteText(ts).trim(); if (!s) return '-'; const m = s.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}:\d{2}:\d{2})$/); return m ? `${m[2]}-${m[3]} ${m[4]}` : s; }
function accountKey(acc) { return String(acc?.account_index || ''); }
function findAccountByKey(key) { return state.accounts.find((a) => accountKey(a) === String(key)) || null; }
function accountLabel(accOrKey) { const acc = typeof accOrKey === 'object' ? accOrKey : findAccountByKey(accOrKey); if (!acc) return `#${accOrKey}`; return `#${displayIndexByKey(accountKey(acc))} ${acc.name || ''}`.trim(); }
function getAccountStatus(acc) { const key = accountKey(acc); return state.statusResults[key] || acc?.last_status || null; }
function getAccountQuotaMoney(acc) {
  const sr = getAccountStatus(acc);
  if (!sr || !(sr.status_state === 'VALID' || sr.session_valid)) return null;
  const money = quotaToMoney(sr?.quota?.quota, sr?.system_status || state.systemStatus);
  return Number.isFinite(money) ? money : null;
}
function maskTag(enabled) { return enabled ? '<span class="tag ok">启用</span>' : '<span class="tag off">停用</span>'; }
function setFieldInvalid(node, invalid) { if (node) node.classList.toggle('input-invalid', !!invalid); }
function clearFieldStates(nodes) { for (const node of nodes) setFieldInvalid(node, false); }

function normalizeBaseUrlInput(value) {
  let v = String(value || '').trim();
  if (!v) return '';
  if (!/^https?:\/\//i.test(v)) v = `https://${v}`;
  try {
    const u = new URL(v);
    u.hash = '';
    u.search = '';
    let out = `${u.protocol}//${u.host}${u.pathname || ''}`;
    out = out.replace(/\/+$/, '');
    return out;
  } catch {
    return v.replace(/\/+$/, '');
  }
}

function bindBaseUrlNormalizer(node) {
  const apply = () => {
    const normalized = normalizeBaseUrlInput(node.value);
    if (normalized) node.value = normalized;
    hideComboLists();
  };
  node.addEventListener('focus', () => showComboList(node));
  node.addEventListener('input', () => showComboList(node));
  node.addEventListener('blur', apply);
  node.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      apply();
      node.blur();
    }
    if (e.key === 'Escape') hideComboLists();
  });
}

function renderKnownBaseUrls(filterValue = '') {
  const lists = [
    { input: el.fBaseUrl, list: el.fBaseUrlList },
    { input: el.mBaseUrl, list: el.mBaseUrlList },
  ];
  const normalizedFilter = String(filterValue || '').trim().toLowerCase();
  const sourceUrls = [...new Set(state.knownBaseUrls.map((url) => normalizeBaseUrlInput(url)).filter(Boolean))];
  for (const { input, list } of lists) {
    if (!list) continue;
    const needle = normalizedFilter || String(input?.value || '').trim().toLowerCase();
    const urls = sourceUrls.filter((url) => !needle || String(url).toLowerCase().includes(needle));
    list.innerHTML = '';
    if (!urls.length) {
      const empty = document.createElement('div');
      empty.className = 'combo-empty';
      empty.textContent = state.knownBaseUrls.length ? '没有匹配的本地地址' : '暂无本地地址';
      list.appendChild(empty);
      continue;
    }
    for (const url of urls) {
      const item = document.createElement('div');
      item.className = 'combo-item';
      item.setAttribute('role', 'option');
      item.textContent = url;
      item.addEventListener('mousedown', (e) => {
        e.preventDefault();
        if (input) {
          input.value = normalizeBaseUrlInput(url);
          setFieldInvalid(input, false);
          if (input === el.mBaseUrl) el.modalError.textContent = '';
          hideComboLists();
          input.focus();
        }
      });
      list.appendChild(item);
    }
  }
}

function hideComboLists() {
  for (const list of [el.fBaseUrlList, el.mBaseUrlList]) if (list) list.classList.remove('open');
}

function showComboList(node) {
  const list = node === el.fBaseUrl ? el.fBaseUrlList : el.mBaseUrlList;
  hideComboLists();
  renderKnownBaseUrls(node.value);
  if (list) list.classList.add('open');
}

function setEditFormDisabled(disabled) {
  for (const node of [el.fName, el.fBaseUrl, el.fUser, el.fSession, el.fKeys, el.fEnabled]) node.disabled = disabled;
  const saveBtn = document.getElementById('btn-save');
  const cancelBtn = document.getElementById('btn-cancel');
  const deleteBtn = document.getElementById('btn-delete');
  if (saveBtn) saveBtn.disabled = disabled;
  if (cancelBtn) cancelBtn.disabled = disabled;
  if (deleteBtn) deleteBtn.disabled = disabled;
}

function resetModalForm() {
  el.mName.value = '';
  el.mBaseUrl.value = '';
  el.mUser.value = '';
  el.mSession.value = '';
  el.mKeys.value = '';
  el.mEnabled.checked = true;
  el.modalError.textContent = '';
  clearFieldStates([el.mName, el.mBaseUrl, el.mUser, el.mSession, el.mKeys]);
}

function openAddModal() {
  state.selected = null;
  fillForm(null);
  renderTable();
  renderDetail();
  resetModalForm();
  el.addModal.classList.add('open');
  el.addModal.setAttribute('aria-hidden', 'false');
  window.setTimeout(() => el.mName.focus(), 30);
}

function closeAddModal() {
  el.addModal.classList.remove('open');
  el.addModal.setAttribute('aria-hidden', 'true');
  el.modalError.textContent = '';
}

function buildPayloadFromInputs(fields) {
  return {
    name: fields.name.value.trim(),
    base_url: normalizeBaseUrlInput(fields.baseUrl.value),
    new_api_user: fields.user.value.trim(),
    session: fields.session.value.trim(),
    api_keys: fields.keys.value,
    enabled: !!fields.enabled.checked,
  };
}

function validatePayload(payload, fields) {
  const errors = [];
  clearFieldStates([fields.name, fields.baseUrl, fields.user, fields.session, fields.keys]);
  if (!payload.name) { errors.push('账号名不能为空'); setFieldInvalid(fields.name, true); }
  else if (!/^[A-Za-z0-9_\-.\u4e00-\u9fa5 ]{2,40}$/.test(payload.name)) { errors.push('账号名需为 2-40 个字符，只允许中文、英文、数字、空格、_ - .'); setFieldInvalid(fields.name, true); }
  if (!payload.new_api_user) { errors.push('new_api_user 不能为空'); setFieldInvalid(fields.user, true); }
  else if (!/^\d+$/.test(payload.new_api_user)) { errors.push('new_api_user 只能是数字'); setFieldInvalid(fields.user, true); }
  if (!payload.base_url) { errors.push('域名地址(base_url)不能为空'); setFieldInvalid(fields.baseUrl, true); }
  else if (!/^https?:\/\/.+/.test(payload.base_url)) { errors.push('域名地址(base_url)格式不正确'); setFieldInvalid(fields.baseUrl, true); }
  if (!payload.session) { errors.push('Session 不能为空'); setFieldInvalid(fields.session, true); }
  else if (/\s/.test(payload.session) || payload.session.length < 20) { errors.push('Session 不能包含空白字符，且长度不能过短'); setFieldInvalid(fields.session, true); }
  const keyLines = payload.api_keys.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
  const invalidKey = keyLines.find((line) => /\s/.test(line) || line.length < 10);
  if (invalidKey) { errors.push('API Key 每行一条，且单条不能包含空格并至少 10 个字符'); setFieldInvalid(fields.keys, true); }
  return errors;
}

function fillForm(acc = null) {
  if (!acc) {
    state.editingAccountKey = null;
    el.fName.value = '';
    el.fBaseUrl.value = '';
    el.fUser.value = '';
    el.fSession.value = '';
    el.fKeys.value = '';
    el.fEnabled.checked = true;
    clearFieldStates([el.fName, el.fBaseUrl, el.fUser, el.fSession, el.fKeys]);
    setEditFormDisabled(true);
    el.panelTitle.textContent = '账号编辑';
    return;
  }
  state.editingAccountKey = accountKey(acc);
  el.fName.value = acc.name || '';
  el.fBaseUrl.value = acc.base_url || '';
  el.fUser.value = acc.new_api_user || '';
  el.fSession.value = acc.session || '';
  el.fKeys.value = (acc.api_keys || []).join('\n');
  el.fEnabled.checked = !!acc.enabled;
  clearFieldStates([el.fName, el.fBaseUrl, el.fUser, el.fSession, el.fKeys]);
  setEditFormDisabled(false);
  el.panelTitle.textContent = `编辑账号：${acc.name}`;
}

function renderRowSummary(key) {
  if (state.pendingAccounts[key]) {
    return {
      checkinText: state.pendingAccounts[key] === 'checkin' ? '处理中...' : (state.signinStatus[key] || '未签到'),
      statusText: state.pendingAccounts[key] === 'status' ? '处理中...' : '-',
    };
  }
  const s = state.statusResults[key];
  const checkinText = state.signinStatus[key] || '未签到';
  let statusText = '-';
  if (s) {
    statusText = (s.status_state === 'VALID' || s.session_valid) ? '有效' : '异常';
    if (statusText === '异常') {
      console.warn('账号检测异常', s.account || '', s.api_error || '', s);
    }
  }
  return { checkinText, statusText };
}

function displayIndexByKey(key) {
  const idx = state.accounts.findIndex((acc) => accountKey(acc) === String(key));
  return idx >= 0 ? idx + 1 : '-';
}

function attachDragEvents(tr, key) {
  tr.draggable = true;
  tr.addEventListener('dragstart', (e) => {
    state.dragKey = key;
    tr.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', key);
  });
  tr.addEventListener('dragend', () => {
    state.dragKey = null;
    tr.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
    for (const row of el.body.querySelectorAll('tr')) row.classList.remove('drag-over-top', 'drag-over-bottom');
  });
  tr.addEventListener('dragover', (e) => {
    e.preventDefault();
    if (!state.dragKey || state.dragKey === key) return;
    const rect = tr.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;
    tr.classList.toggle('drag-over-top', before);
    tr.classList.toggle('drag-over-bottom', !before);
  });
  tr.addEventListener('dragleave', () => {
    tr.classList.remove('drag-over-top', 'drag-over-bottom');
  });
  tr.addEventListener('drop', async (e) => {
    e.preventDefault();
    tr.classList.remove('drag-over-top', 'drag-over-bottom');
    const fromKey = state.dragKey || e.dataTransfer.getData('text/plain');
    if (!fromKey || fromKey === key) return;
    const rect = tr.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;
    await reorderAccounts(fromKey, key, before);
  });
}

function getGroupedAccounts() {
  const map = new Map();
  for (const acc of state.accounts) {
    const url = normalizeBaseUrlInput(acc.base_url || state.defaultBaseUrl || '未设置地址') || '未设置地址';
    if (!map.has(url)) map.set(url, []);
    map.get(url).push(acc);
  }
  return Array.from(map.entries()).map(([baseUrl, accounts]) => ({ baseUrl, accounts }));
}

function groupKeyFromUrl(url) { return `base:${url}`; }

function getGroupStats(accounts) {
  let enabled = 0, signed = 0, valid = 0, totalMoney = 0, hasMoney = false, systemStatus = null;
  for (const acc of accounts) {
    const key = accountKey(acc);
    if (acc.enabled) enabled += 1;
    if ((state.signinStatus[key] || acc.signin_status) === '已签到') signed += 1;
    const sr = getAccountStatus(acc);
    if (sr && (sr.status_state === 'VALID' || sr.session_valid)) {
      valid += 1;
      const sys = sr?.system_status || state.systemStatus;
      if (!systemStatus && sys) systemStatus = sys;
      const money = quotaToMoney(sr?.quota?.quota, sys);
      if (Number.isFinite(money)) { totalMoney += money; hasMoney = true; }
    }
  }
  return { enabled, signed, valid, totalMoney: hasMoney ? totalMoney : null, systemStatus };
}

function renderGroupRow(group) {
  const key = groupKeyFromUrl(group.baseUrl);
  const collapsed = !!state.collapsedGroups[key];
  const stats = getGroupStats(group.accounts);
  const tr = document.createElement('tr');
  tr.className = 'group-row';
  tr.title = '点击地址分组可展开或折叠';
  tr.addEventListener('click', (e) => {
    if (e.target.closest('button')) return;
    state.collapsedGroups[key] = !state.collapsedGroups[key];
    renderTable();
  });
  tr.innerHTML = `
    <td class="group-cell" colspan="8">
      <div class="group-box">
        <div class="group-main">
          <button type="button" class="fold-btn secondary" data-group-action="toggle" data-group-key="${key}" title="展开/折叠">${collapsed ? '▶' : '▼'}</button>
          <span class="group-url mono">${group.baseUrl}</span>
          <span class="group-stats">
            <span class="group-stat">账号数 ${group.accounts.length}</span>
            <span class="group-stat">可用数 ${stats.valid}</span>
            <span class="group-stat">今日签到数 ${stats.signed}</span>
            <span class="group-stat">总额度 ${formatMoney(stats.totalMoney, stats.systemStatus || state.systemStatus)}</span>
          </span>
        </div>
        <div class="group-actions">
          <button type="button" data-group-action="checkin" data-group-key="${key}">全部签到</button>
          <button type="button" class="secondary" data-group-action="status" data-group-key="${key}">全部检测</button>
        </div>
      </div>
    </td>`;
  return tr;
}

function renderTable() {
  el.body.innerHTML = '';
  for (const group of getGroupedAccounts()) {
    const groupKey = groupKeyFromUrl(group.baseUrl);
    el.body.appendChild(renderGroupRow(group));
    if (state.collapsedGroups[groupKey]) continue;

    group.accounts.forEach((acc) => {
      const key = accountKey(acc);
      const index = state.accounts.findIndex((item) => accountKey(item) === key);
      const tr = document.createElement('tr');
      if (state.selected && accountKey(state.selected) === key) tr.classList.add('selected');
      tr.addEventListener('click', () => selectAccount(key));
      attachDragEvents(tr, key);

      const running = !!state.pendingAccounts[key];
      const rowSum = renderRowSummary(key);
      const activeAction = state.pendingAccounts[key];
      const checkinLabel = activeAction === 'checkin' ? '签到中' : '签到';
      const statusLabel = activeAction === 'status' ? '检测中' : '检测';
      const deleteLabel = activeAction === 'delete' ? '处理中' : '删除';

      tr.innerHTML = `
        <td class="drag-handle" aria-label="排序">☰</td>
        <td class="mono">${index + 1}</td>
        <td>${acc.name || ''}</td>
        <td>${running ? '<span class="tag run">处理中</span>' : maskTag(acc.enabled)}</td>
        <td class="mono">${acc.new_api_user || ''}</td>
        <td class="small">${rowSum.checkinText}</td>
        <td class="small status-short" title="${(state.statusResults[key]?.api_error || '').replace(/"/g, '&quot;')}">${rowSum.statusText}</td>
        <td>
          <div class="row-actions">
            <button data-action="copy" data-key="${key}" class="secondary" title="复制APIKey" ${running ? 'disabled' : ''}>复制</button>
            <button data-action="checkin" data-key="${key}" class="${activeAction === 'checkin' ? 'busy-button' : ''}" ${running ? 'disabled' : ''}>${checkinLabel}</button>
            <button data-action="status" data-key="${key}" class="secondary ${activeAction === 'status' ? 'busy-button' : ''}" ${running ? 'disabled' : ''}>${statusLabel}</button>
            <button data-action="delete" data-key="${key}" class="bad ${activeAction === 'delete' ? 'busy-button' : ''}" ${running ? 'disabled' : ''}>${deleteLabel}</button>
          </div>
        </td>
      `;
      el.body.appendChild(tr);
    });
  }

  for (const btn of el.body.querySelectorAll('button[data-action]')) {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const key = btn.dataset.key;
      if (action === 'copy') return copyApiKeys(key);
      if (action === 'checkin') await withAccountBusy(key, 'checkin', () => checkinOne(key));
      if (action === 'status') await withAccountBusy(key, 'status', () => statusOne(key));
      if (action === 'delete') await withAccountBusy(key, 'delete', () => deleteOne(key));
    });
  }

  for (const btn of el.body.querySelectorAll('button[data-group-action]')) {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = btn.dataset.groupAction;
      const key = btn.dataset.groupKey;
      const group = getGroupedAccounts().find((g) => groupKeyFromUrl(g.baseUrl) === key);
      if (!group) return;
      if (action === 'toggle') {
        state.collapsedGroups[key] = !state.collapsedGroups[key];
        renderTable();
        return;
      }
      if (action === 'checkin') {
        await runGroupCheckin(group);
        return;
      }
      if (action === 'status') {
        await runGroupStatus(group);
        return;
      }
    });
  }
}

function metricTone(value) { const n = Number(value); if (!Number.isFinite(n)) return 'metric-neutral'; if (n > 0) return 'metric-positive'; if (n < 0) return 'metric-negative'; return 'metric-neutral'; }
function flashDetail() { el.detailStatus.classList.remove('flash'); void el.detailStatus.offsetWidth; el.detailStatus.classList.add('flash'); }

function renderDetail() {
  if (!state.selected) {
    el.detailEmpty.style.display = 'block';
    el.detailContent.style.display = 'none';
    return;
  }
  el.detailEmpty.style.display = 'none';
  el.detailContent.style.display = 'block';
  const acc = state.selected;
  const key = accountKey(acc);
  const sr = state.statusResults[key];
  const signState = state.signinStatus[key] || '未签到';
  const identity = sr?.identity || {};
  const sys = sr?.system_status || state.systemStatus;
  const q = sr?.quota || {};
  const delta = sr?.quota_delta || {};
  const yesterday = sr?.yesterday_delta || {};
  const currentMoney = sr?.session_valid ? quotaToMoney(q.quota, sys) : null;
  const changeMoney = sr?.session_valid ? quotaToMoney(delta.change_from_previous, sys) : null;
  const yesterdayMoney = sr?.session_valid ? quotaToMoney(yesterday.change_from_yesterday_last, sys) : null;
  const prevTime = formatShortTs(delta.previous_timestamp);
  const sourceTip = sr?.quota_source === 'cache' ? '（当前额度取自上次缓存记录）' : '';

  el.detailStatus.innerHTML = `
    <div class="hero-title">
      <div>
        <div class="hero-name">${acc.name || '-'}</div>
        <div class="hero-email">${identity.email || '未检测到邮箱信息'}</div>
      </div>
    </div>
    <div class="hero-badges">
      <span class="hero-badge mono">序号：${displayIndexByKey(key)}</span>
      <span class="hero-badge">状态：${acc.enabled ? '启用' : '停用'}</span>
      <span class="hero-badge">今日签到：${signState}</span>
      <span class="hero-badge mono">地址：${acc.base_url || '-'}</span>
    </div>
    <div class="metric-grid">
      <div class="metric-card">
        <div class="metric-label">当前额度</div>
        <div class="metric-value">${formatMoney(currentMoney, sys)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">与上次检测时相比</div>
        <div class="metric-value ${metricTone(changeMoney)}">${formatMoney(changeMoney, sys, true)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">与昨天最后一次检测时相比</div>
        <div class="metric-value ${metricTone(yesterdayMoney)}">${formatMoney(yesterdayMoney, sys, true)}</div>
      </div>
    </div>
    <div class="small" style="margin-top:12px;">上次检测时间：${prevTime}${sourceTip}</div>
    ${sr && !sr.session_valid ? `<div class="small bad2" style="margin-top:8px; word-break:break-word;">异常信息：${sr.api_error || '接口返回异常'}<\/div>` : ''}
  `;
  flashDetail();
  fillForm(acc);
}

function selectAccount(key) {
  state.selected = findAccountByKey(key);
  if (state.selected) fillForm(state.selected);
  renderTable();
  renderDetail();
}

async function refreshAccounts() {
  const data = await api('/api/accounts');
  state.accounts = data.accounts || [];
  state.defaultBaseUrl = data.default_base_url || state.defaultBaseUrl;
  state.knownBaseUrls = Array.isArray(data.known_base_urls) ? data.known_base_urls : [];
  renderKnownBaseUrls();
  state.signinStatus = {};
  state.statusResults = {};
  for (const acc of state.accounts) {
    const key = accountKey(acc);
    state.signinStatus[key] = acc.signin_status || '未签到';
    if (acc.last_status && typeof acc.last_status === 'object') state.statusResults[key] = acc.last_status;
  }
  if (state.selected) state.selected = findAccountByKey(accountKey(state.selected));
  renderTable();
  renderDetail();
}

function setButtonBusy(button, busy, busyText = '') {
  if (!button) return;
  if (busy) {
    if (!button.dataset.label) button.dataset.label = button.textContent;
    button.textContent = busyText || button.textContent;
    button.classList.add('busy-button');
    button.disabled = true;
    return;
  }
  button.textContent = button.dataset.label || button.textContent;
  button.classList.remove('busy-button');
  button.disabled = false;
}

async function withGlobalBusy(text, button, busyText, fn) {
  if (state.pendingGlobal) return;
  state.pendingGlobal = true;
  setButtonBusy(button, true, busyText);
  for (const btn of [el.btnRefresh, el.btnCheckinAll, el.btnStatusAll, el.btnNew, el.btnSortDir, el.btnApplySort]) if (btn && btn !== button) btn.disabled = true;
  setBusyText(`正在执行：${text}`);
  try { await fn(); } finally {
    state.pendingGlobal = false;
    setButtonBusy(button, false);
    for (const btn of [el.btnRefresh, el.btnCheckinAll, el.btnStatusAll, el.btnNew, el.btnSortDir, el.btnApplySort]) if (btn && btn !== button) btn.disabled = false;
    setBusyText('');
  }
}

async function withAccountBusy(key, action, fn) {
  if (state.pendingAccounts[key]) return;
  state.pendingAccounts[key] = action;
  setBusyText(`${accountLabel(key)} 正在执行：${action}`);
  renderTable();
  try { await fn(); } finally {
    delete state.pendingAccounts[key];
    setBusyText('');
    renderTable();
    renderDetail();
  }
}

async function copyApiKeys(key) {
  const acc = findAccountByKey(key);
  const label = accountLabel(acc || key);
  if (!acc) return notify('bad2', '未找到账号', `${label} 不存在于当前列表中。`);
  const keys = Array.isArray(acc.api_keys) ? acc.api_keys.filter(Boolean) : [];
  if (!keys.length) return notify('warn2', '没有可复制的 API Key', `${label} 当前没有保存可复制的 Key。`);
  try {
    await navigator.clipboard.writeText(keys.join('\n'));
    log(`${label} API Key 已复制（${keys.length} 条）`, 'ok');
    notify('ok', '复制成功', `${label} 的 API Key 已复制到剪贴板，共 ${keys.length} 条。`);
  } catch (e) {
    log(`${label} 复制失败：${e.message || e}`, 'bad2');
    notify('bad2', '复制失败', `${label} 的 API Key 复制失败：${e.message || e}`);
  }
}

async function reorderAccounts(fromKey, toKey, before) {
  const fromIndex = state.accounts.findIndex((acc) => accountKey(acc) === String(fromKey));
  const toIndex = state.accounts.findIndex((acc) => accountKey(acc) === String(toKey));
  if (fromIndex < 0 || toIndex < 0 || fromIndex === toIndex) return;
  state.sortField = 'manual';
  if (el.sortField) el.sortField.value = 'manual';
  const moved = state.accounts.splice(fromIndex, 1)[0];
  let insertIndex = toIndex;
  if (fromIndex < toIndex) insertIndex -= 1;
  if (!before) insertIndex += 1;
  state.accounts.splice(insertIndex, 0, moved);
  renderTable();
  renderDetail();
  try {
    await api('/api/accounts/reorder', {
      method: 'POST',
      body: JSON.stringify({ ordered_ids: state.accounts.map((acc) => Number(acc.account_index)) })
    });
    log('账号顺序已更新', 'ok');
    notify('ok', '排序已更新', '账号可上下拖动，序号已随之变化。');
    if (state.selected) state.selected = findAccountByKey(accountKey(state.selected));
  } catch (e) {
    log(`排序失败：${e.message}`, 'bad2');
    notify('bad2', '排序失败', e.message || String(e));
    await refreshAccounts();
  }
}

async function checkinOne(key) {
  const label = accountLabel(key);
  notify('warn2', '开始签到', `${label} 正在执行签到。`);
  const data = await api(`/api/accounts/${encodeURIComponent(key)}/checkin`, { method: 'POST', body: '{}' });
  state.checkinResults[key] = data.result;
  if (data.result.state === 'FAILED') { state.signinStatus[key] = '未签到'; log(`${label} 签到失败：${data.result.message || ''}`, 'bad2'); notify('bad2', '签到失败', `${label}：${data.result.message || '未知原因'}`); }
  else if (data.result.state === 'ALREADY_SIGNED') { state.signinStatus[key] = '已签到'; log(`${label} 今日已签到`, 'warn2'); notify('warn2', '今日已签到', `${label} 今天已经完成签到。`); }
  else { state.signinStatus[key] = '已签到'; log(`${label} 签到成功`, 'ok'); notify('ok', '签到成功', `${label} 已成功签到。`); }
}

async function statusOne(key) {
  const label = accountLabel(key);
  notify('warn2', '开始检测', `${label} 正在更新余额与状态信息。`);
  const data = await api(`/api/accounts/${encodeURIComponent(key)}/status`, { method: 'POST', body: '{}' });
  state.statusResults[key] = data.result;
  state.systemStatus = data.system_status || state.systemStatus;
  const r = data.result;
  if (r.session_valid) {
    const q = r.quota || {}; const dc = r.quota_delta || {}; const sys = r.system_status || state.systemStatus;
    log(`${label} 检测成功：额度=${formatMoney(quotaToMoney(q.quota, sys), sys)}，与上次相比=${formatMoney(quotaToMoney(dc.change_from_previous, sys), sys, true)}`, 'ok');
    notify('ok', '检测完成', `${label} 当前额度 ${formatMoney(quotaToMoney(q.quota, sys), sys)}，与上次相比 ${formatMoney(quotaToMoney(dc.change_from_previous, sys), sys, true)}。`);
  } else {
    log(`${label} 检测失败：${r.api_error || ''}`, r.status_state === 'INVALID_SESSION' ? 'bad2' : 'warn2');
    notify(r.status_state === 'INVALID_SESSION' ? 'bad2' : 'warn2', '检测异常', `${label}：${r.api_error || '接口返回异常'}`);
  }
}

async function checkinAll() {
  notify('warn2', '开始全部签到', '正在批量执行签到，请稍候。');
  const data = await api('/api/accounts/checkin-all', { method: 'POST', body: '{}' });
  let okCount = 0, alreadyCount = 0, unsignedCount = 0;
  for (const r of data.results || []) {
    const key = String(r.account_index || '');
    const label = accountLabel(key);
    state.checkinResults[key] = r;
    if (r.state === 'FAILED') { state.signinStatus[key] = '未签到'; log(`${label} 签到失败：${r.message || ''}`, 'bad2'); unsignedCount += 1; }
    else if (r.state === 'ALREADY_SIGNED') { state.signinStatus[key] = '已签到'; log(`${label} 今日已签到`, 'warn2'); alreadyCount += 1; }
    else { state.signinStatus[key] = '已签到'; log(`${label} 签到成功`, 'ok'); okCount += 1; }
  }
  notify('ok', '全部签到完成', `成功 ${okCount} 个，已签到 ${alreadyCount} 个，未签到 ${unsignedCount} 个。`);
}

async function statusAll() {
  notify('warn2', '开始全部检测', '正在批量更新账号余额与状态。');
  const data = await api('/api/accounts/status-all', { method: 'POST', body: '{}' });
  state.systemStatus = data.system_status || state.systemStatus;
  let validCount = 0, failCount = 0;
  for (const r of data.results || []) {
    const key = String(r.account_index || '');
    const label = accountLabel(key);
    state.statusResults[key] = r;
    if (r.session_valid) { log(`${label} 检测成功`, 'ok'); validCount += 1; }
    else { log(`${label} 检测异常：${r.api_error || ''}`, 'warn2'); failCount += 1; }
  }
  notify('ok', '全部检测完成', `有效 ${validCount} 个，异常 ${failCount} 个。`);
}


async function runGroupCheckin(group) {
  const accounts = group.accounts.filter((acc) => acc.enabled);
  notify('warn2', '开始地址签到', `${group.baseUrl}：共 ${accounts.length} 个启用账号。`);
  for (const acc of accounts) {
    const key = accountKey(acc);
    await withAccountBusy(key, 'checkin', () => checkinOne(key));
  }
  renderTable();
  renderDetail();
  notify('ok', '地址签到完成', `${group.baseUrl} 已执行完成。`);
}

async function runGroupStatus(group) {
  const accounts = group.accounts.filter((acc) => acc.enabled);
  notify('warn2', '开始地址检测', `${group.baseUrl}：共 ${accounts.length} 个启用账号。`);
  for (const acc of accounts) {
    const key = accountKey(acc);
    await withAccountBusy(key, 'status', () => statusOne(key));
  }
  renderTable();
  renderDetail();
  notify('ok', '地址检测完成', `${group.baseUrl} 已执行完成。`);
}

function compareAccountsForSort(a, b, indexMap) {
  const dir = state.sortDir === 'asc' ? 1 : -1;
  if (state.sortField === 'new_api_user') {
    const av = Number(a.new_api_user);
    const bv = Number(b.new_api_user);
    const aOk = Number.isFinite(av);
    const bOk = Number.isFinite(bv);
    if (aOk && bOk && av !== bv) return (av - bv) * dir;
    if (aOk !== bOk) return aOk ? -1 : 1;
  }
  if (state.sortField === 'quota') {
    const av = getAccountQuotaMoney(a);
    const bv = getAccountQuotaMoney(b);
    const aOk = Number.isFinite(av);
    const bOk = Number.isFinite(bv);
    if (aOk && bOk && av !== bv) return (av - bv) * dir;
    if (aOk !== bOk) return aOk ? -1 : 1;
  }
  return (indexMap.get(accountKey(a)) || 0) - (indexMap.get(accountKey(b)) || 0);
}

async function applyTopSort() {
  state.sortField = el.sortField.value || 'manual';
  if (state.sortField === 'manual') {
    notify('warn2', '请选择排序字段', '可以选择 new_api_user 或额度进行排序。');
    return;
  }
  if (state.sortField === 'quota' && !state.accounts.some((acc) => Number.isFinite(getAccountQuotaMoney(acc)))) {
    notify('warn2', '缺少额度数据', '请先执行全部检测或单账号检测，再按额度排序。');
    return;
  }
  const indexMap = new Map(state.accounts.map((acc, index) => [accountKey(acc), index]));
  state.accounts = [...state.accounts].sort((a, b) => compareAccountsForSort(a, b, indexMap));
  renderTable();
  try {
    await api('/api/accounts/reorder', {
      method: 'POST',
      body: JSON.stringify({ ordered_ids: state.accounts.map((acc) => Number(acc.account_index)) })
    });
    const label = state.sortField === 'quota' ? '额度' : 'new_api_user';
    notify('ok', '排序已更新', `${label} 已按${state.sortDir === 'asc' ? '升序' : '降序'}排列。`);
    log(`排序已更新：${label} ${state.sortDir === 'asc' ? '升序' : '降序'}`, 'ok');
  } catch (e) {
    notify('bad2', '排序失败', e.message || String(e));
    log(`排序失败：${e.message || e}`, 'bad2');
    await refreshAccounts();
  }
}

async function saveForm() {
  if (!state.editingAccountKey) { notify('warn2', '未选择账号', '请先点击左侧账号行，再编辑保存。'); return; }
  const key = state.editingAccountKey;
  const payload = buildPayloadFromInputs({ name: el.fName, baseUrl: el.fBaseUrl, user: el.fUser, session: el.fSession, keys: el.fKeys, enabled: el.fEnabled });
  el.fBaseUrl.value = payload.base_url;
  const errors = validatePayload(payload, { name: el.fName, baseUrl: el.fBaseUrl, user: el.fUser, session: el.fSession, keys: el.fKeys, enabled: el.fEnabled });
  if (errors.length) { log(`保存失败：${errors[0]}`, 'bad2'); notify('bad2', '保存失败', errors[0]); return; }
  await api(`/api/accounts/${encodeURIComponent(key)}`, { method: 'PUT', body: JSON.stringify(payload) });
  log(`已更新账号 #${displayIndexByKey(key)}：${payload.name}`, 'ok');
  notify('ok', '账号已更新', `#${displayIndexByKey(key)} 已更新为 ${payload.name}。`);
  await refreshAccounts();
  selectAccount(key);
}

async function saveNewAccount() {
  const payload = buildPayloadFromInputs({ name: el.mName, baseUrl: el.mBaseUrl, user: el.mUser, session: el.mSession, keys: el.mKeys, enabled: el.mEnabled });
  el.mBaseUrl.value = payload.base_url;
  const errors = validatePayload(payload, { name: el.mName, baseUrl: el.mBaseUrl, user: el.mUser, session: el.mSession, keys: el.mKeys, enabled: el.mEnabled });
  if (errors.length) { el.modalError.textContent = errors[0]; notify('bad2', '创建失败', errors[0]); return; }
  el.modalError.textContent = '';
  const data = await api('/api/accounts', { method: 'POST', body: JSON.stringify(payload) });
  const key = accountKey(data.account);
  log(`已添加账号 #${displayIndexByKey(key)}：${payload.name}`, 'ok');
  notify('ok', '账号已添加', `${payload.name} 已加入列表。`);
  closeAddModal();
  await refreshAccounts();
  if (key) selectAccount(key);
}

async function deleteOne(key) {
  const label = accountLabel(key);
  if (!confirm(`确定删除账号 ${label} 吗？`)) return;
  await api(`/api/accounts/${encodeURIComponent(key)}`, { method: 'DELETE' });
  delete state.checkinResults[key]; delete state.statusResults[key]; delete state.signinStatus[key];
  if (state.selected && accountKey(state.selected) === String(key)) { state.selected = null; fillForm(null); }
  log(`已删除账号：${label}`, 'ok');
  notify('ok', '账号已删除', `${label} 已从本地控制台移除。`);
  await refreshAccounts();
}

el.btnRefresh.addEventListener('click', () => withGlobalBusy('刷新账号', el.btnRefresh, '刷新中', async () => {
  await refreshAccounts();
  log('账号列表已刷新', 'ok');
  notify('ok', '列表已刷新', '账号列表和本地状态已经更新。');
}).catch(e => log(e.message, 'bad2')));

el.btnCheckinAll.addEventListener('click', () => withGlobalBusy('全部签到', el.btnCheckinAll, '签到中', async () => {
  await checkinAll();
  renderTable();
}).catch(e => log(e.message, 'bad2')));

el.btnStatusAll.addEventListener('click', () => withGlobalBusy('全部检测', el.btnStatusAll, '检测中', async () => {
  await statusAll();
  renderTable();
  renderDetail();
}).catch(e => log(e.message, 'bad2')));

el.sortField.addEventListener('change', () => {
  state.sortField = el.sortField.value || 'manual';
});
el.btnSortDir.addEventListener('click', () => {
  state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  el.btnSortDir.textContent = state.sortDir === 'asc' ? '升序' : '降序';
});
el.btnApplySort.addEventListener('click', () => withGlobalBusy('账号排序', el.btnApplySort, '排序中', applyTopSort).catch(e => log(e.message, 'bad2')));

document.getElementById('btn-new').addEventListener('click', () => openAddModal());
document.getElementById('btn-save').addEventListener('click', () => withGlobalBusy('保存账号', document.getElementById('btn-save'), '保存中', saveForm).catch(e => log(e.message, 'bad2')));
document.getElementById('btn-cancel').addEventListener('click', () => { if (state.selected) fillForm(state.selected); else fillForm(null); });
document.getElementById('btn-delete').addEventListener('click', () => { if (!state.editingAccountKey) return; withGlobalBusy('删除账号', document.getElementById('btn-delete'), '删除中', () => deleteOne(state.editingAccountKey)).catch(e => log(e.message, 'bad2')); });
el.btnModalCancel.addEventListener('click', () => closeAddModal());
el.btnModalSave.addEventListener('click', () => withGlobalBusy('创建账号', el.btnModalSave, '创建中', saveNewAccount).catch(e => {
  el.modalError.textContent = e.message || String(e);
  notify('bad2', '创建失败', e.message || String(e));
  log(e.message || String(e), 'bad2');
}));
el.addModal.addEventListener('click', (e) => { if (e.target === el.addModal) closeAddModal(); });
window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && el.addModal.classList.contains('open')) closeAddModal(); });
for (const node of [el.fName, el.fBaseUrl, el.fUser, el.fSession, el.fKeys, el.mName, el.mBaseUrl, el.mUser, el.mSession, el.mKeys]) {
  node.addEventListener('input', () => {
    setFieldInvalid(node, false);
    if ([el.mName, el.mBaseUrl, el.mUser, el.mSession, el.mKeys].includes(node)) el.modalError.textContent = '';
  });
}
for (const toggle of document.querySelectorAll('.combo-toggle')) {
  toggle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const node = document.getElementById(toggle.dataset.comboTarget || '');
    if (!node) return;
    showComboList(node);
    node.focus();
  });
}
document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('.combo-wrap')) hideComboLists();
});
bindBaseUrlNormalizer(el.fBaseUrl);
bindBaseUrlNormalizer(el.mBaseUrl);

fillForm(null);
refreshAccounts()
  .then(() => {
    log('页面已就绪', 'ok');
    notify('ok', '页面已就绪', '可以直接选择账号、拖动排序、签到或检测余额变化。');
  })
  .catch(e => log(e.message, 'bad2'));
</script>
