<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>new-api 本地控制台</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.svg') }}" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Cormorant+Garamond:wght@600&display=swap");
    :root {
      --bg: #f7f4ed;
      --panel: #fffdf8;
      --line: #eadfce;
      --line-strong: #d8c4a7;
      --text: #2a2218;
      --sub: #7a6853;
      --ok: #2f855a;
      --warn: #b7791f;
      --bad: #c53030;
      --btn: #355c7d;
      --btn2: #6b7280;
      --accent: #d4af37;
      --shadow: 0 10px 30px rgba(68, 52, 31, 0.08);
      --action-col: 168px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans SC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 5% 5%, rgba(212, 175, 55, 0.14), transparent 40%),
        radial-gradient(circle at 95% 10%, rgba(106, 160, 125, 0.15), transparent 32%),
        linear-gradient(180deg, #fbf8f2 0%, #f7f4ed 100%);
    }
    .wrap { max-width: 1480px; margin: 0 auto; padding: 22px 18px 26px; }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      background: linear-gradient(120deg, #fffdf8 0%, #fef9ef 100%);
      box-shadow: var(--shadow);
    }
    h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1.05;
      font-family: "Cormorant Garamond", serif;
      letter-spacing: 0.4px;
    }
    .sub { color: var(--sub); font-size: 13px; margin-top: 2px; }
    .bar { display: flex; flex-wrap: wrap; gap: 8px; }
    button {
      border: 0;
      border-radius: 9px;
      padding: 8px 13px;
      cursor: pointer;
      background: var(--btn);
      color: #fff;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      box-shadow: 0 3px 10px rgba(53, 92, 125, 0.24);
    }
    button:hover { transform: translateY(-1px); }
    button.secondary { background: var(--btn2); box-shadow: 0 3px 10px rgba(107,114,128,.2); }
    button.warn { background: var(--warn); box-shadow: 0 3px 10px rgba(183,121,31,.23); }
    button.bad { background: var(--bad); box-shadow: 0 3px 10px rgba(197,48,48,.22); }
    button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .grid { display: grid; grid-template-columns: minmax(0, 1.5fr) minmax(480px, .9fr); gap: 12px; align-items: start; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .account-table-wrap { width: 100%; overflow-x: hidden; }
    .account-table { width: 100%; min-width: 0; table-layout: fixed; }
    .account-table th,
    .account-table td { overflow: hidden; text-overflow: ellipsis; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 7px; text-align: left; vertical-align: top; }
    th { color: #503f2c; font-weight: 700; background: rgba(212,175,55,0.08); }
    tr:hover { background: rgba(106, 160, 125, 0.08); }
    tr.selected { background: rgba(53, 92, 125, 0.12); }
    tr.dragging { opacity: .55; }
    tr.drag-over-top { box-shadow: inset 0 3px 0 #355c7d; }
    tr.drag-over-bottom { box-shadow: inset 0 -3px 0 #355c7d; }
    .mono { font-family: Consolas, monospace; }
    .small { color: var(--sub); font-size: 12px; }
    .row-actions { display: flex; gap: 6px; flex-wrap: nowrap; align-items: center; width: 100%; }
    .row-actions button { padding: 5px 6px; font-size: 12px; min-width: 40px; }
    .account-table th:nth-child(8),
    .account-table td:nth-child(8) { width: var(--action-col); }
    .row-actions { justify-content: flex-start; }
    .row-actions button { flex: 0 0 auto; }
    .tag { display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
    .tag.ok { background: rgba(47,133,90,.14); color: #1f6b46; }
    .tag.off { background: rgba(197,48,48,.14); color: #9b2c2c; }
    .tag.run { background: rgba(183,121,31,.14); color: #975a16; }
    .group-row { background: rgba(212,175,55,0.10); cursor: pointer; }
    .group-row:hover { background: rgba(212,175,55,0.16); }
    .group-cell { padding: 12px 7px; overflow: visible !important; }
    .group-box { display:grid; grid-template-columns:minmax(0, 1fr) var(--action-col); align-items:center; gap:12px; }
    .group-main { display:grid; grid-template-columns: 30px minmax(0, 1fr); gap:8px 10px; align-items:center; min-width:0; }
    .group-url { font-weight:700; word-break:break-all; }
    .group-stats { grid-column: 2; display:flex; gap:7px; flex-wrap:wrap; color: var(--sub); font-size: 12px; }
    .group-stat { display:inline-flex; font-weight:600; }
    .group-actions { display:flex; gap:10px; flex-wrap:nowrap; justify-content:flex-end; flex-shrink:0; }
    .group-actions button { padding:5px 8px; font-size:12px; }
    .fold-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 0;
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #715829;
      background: transparent;
      box-shadow: none;
    }
    .fold-btn:hover {
      color: #2f5878;
      background: rgba(212,175,55,.14);
      box-shadow: none;
      transform: none;
    }
    .fold-icon {
      width: 9px;
      height: 9px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(-45deg);
      transition: transform .16s ease;
    }
    .fold-icon.expanded { transform: rotate(45deg); }
    .status-short { white-space: nowrap; }
    .list-tools {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .sort-tools { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .sort-tools select { width: 150px; height: 34px; padding: 6px 8px; }
    .sort-tools button { padding: 7px 10px; }
    .drag-handle {
      cursor: grab;
      user-select: none;
      font-size: 16px;
      line-height: 1;
      color: #8a6d3b;
      text-align: center;
      width: 20px;
    }
    tr.dragging .drag-handle { cursor: grabbing; }
    .form-group { margin-bottom: 9px; }
    label { display: block; margin-bottom: 5px; color: var(--sub); font-size: 12px; font-weight: 600; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #d7c5ab;
      border-radius: 8px;
      padding: 8px;
      background: #fffefb;
      color: var(--text);
      font-size: 13px;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #b08b2f;
      box-shadow: 0 0 0 3px rgba(212,175,55,0.22);
    }
    textarea { min-height: 84px; resize: vertical; }
    .inline { display: flex; align-items: center; gap: 8px; }
    .inline input[type="checkbox"] { width: auto; accent-color: #355c7d; }
    .log {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 8px;
      max-height: 190px;
      overflow: auto;
      background: #fffefb;
      font-size: 12px;
    }
    .log-item { margin-bottom: 6px; }
    .ok { color: var(--ok); }
    .warn2 { color: var(--warn); }
    .bad2 { color: var(--bad); }
    .status-line {
      margin-top: 8px;
      color: #5f4e3b;
      font-size: 12px;
      min-height: 18px;
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 7px;
      padding: 2px 8px;
    }
    .detail-hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      padding: 14px;
      background:
        radial-gradient(circle at top right, rgba(212, 175, 55, 0.18), transparent 28%),
        linear-gradient(135deg, #fffdfa 0%, #fff6e6 100%);
      box-shadow: 0 14px 34px rgba(91, 67, 35, 0.1);
    }
    .detail-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: translateX(-120%);
      opacity: 0;
      pointer-events: none;
    }
    .detail-hero.flash::after {
      opacity: 1;
      animation: heroSweep 1s ease;
    }
    @keyframes heroSweep {
      from { transform: translateX(-120%); }
      to { transform: translateX(120%); }
    }
    .hero-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }
    .hero-name {
      font-size: 27px;
      line-height: 1;
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .hero-email {
      color: var(--sub);
      font-size: 12px;
      word-break: break-all;
    }
    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .hero-meta {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }
    .hero-address-row {
      display: flex;
      min-width: 0;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(176,139,47,.2);
      white-space: normal;
      word-break: break-word;
    }
    .hero-address-badge {
      width: fit-content;
      justify-content: flex-start;
      border-radius: 11px;
      padding-right: 6px;
    }
    .hero-address-text {
      min-width: 0;
      flex: 0 1 auto;
      word-break: break-all;
    }
    .site-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .site-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .site-section-title {
      font-size: 14px;
      font-weight: 700;
      color: #4a3827;
    }
    .site-remark-editor {
      min-height: 72px;
      margin-bottom: 8px;
    }
    .site-models {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .site-model {
      max-width: 100%;
      padding: 6px 9px;
      border: 1px solid rgba(176,139,47,.24);
      border-radius: 8px;
      background: rgba(255,255,255,.72);
      color: #4a3827;
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .site-model-empty {
      color: var(--sub);
      font-size: 12px;
    }
    .copy-icon-button {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #5f4e3b;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(176,139,47,.26);
      box-shadow: none;
    }
    .copy-icon-button:hover {
      transform: translateY(-1px);
      background: #fffaf0;
      box-shadow: 0 5px 12px rgba(68,52,31,.12);
    }
    .copy-icon {
      position: relative;
      width: 13px;
      height: 13px;
    }
    .copy-icon::before,
    .copy-icon::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border: 1.5px solid currentColor;
      border-radius: 2px;
      background: #fffaf0;
    }
    .copy-icon::before { left: 1px; top: 1px; }
    .copy-icon::after { right: 0; bottom: 0; }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .metric-card {
      border: 1px solid rgba(176,139,47,.22);
      border-radius: 12px;
      background: rgba(255,255,255,0.74);
      padding: 11px;
      min-height: 94px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .metric-label {
      color: var(--sub);
      font-size: 12px;
      font-weight: 600;
    }
    .metric-value {
      max-width: 100%;
      font-size: 26px;
      line-height: 1.05;
      font-weight: 700;
      color: #2d3748;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }
    .metric-positive { color: var(--ok); }
    .metric-negative { color: var(--bad); }
    .metric-neutral { color: #5f4e3b; }
    .toast-stack {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      min-width: 260px;
      max-width: 380px;
      border-radius: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,.6);
      box-shadow: 0 18px 40px rgba(56, 42, 23, 0.16);
      backdrop-filter: blur(10px);
      color: #fff;
      animation: toastIn .22s ease;
    }
    .toast.ok { background: rgba(47,133,90,.92); }
    .toast.warn2 { background: rgba(183,121,31,.92); }
    .toast.bad2 { background: rgba(197,48,48,.92); }
    .toast-title { font-weight: 700; margin-bottom: 4px; font-size: 13px; }
    .toast-body { font-size: 12px; opacity: .96; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-8px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .busy-button {
      position: relative;
      padding-left: 28px !important;
    }
    .busy-button::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 50%;
      width: 10px;
      height: 10px;
      margin-top: -6px;
      border: 2px solid rgba(255,255,255,.55);
      border-top-color: #fff;
      border-radius: 999px;
      animation: spin .7s linear infinite;
    }
    .input-invalid {
      border-color: #c53030 !important;
      box-shadow: 0 0 0 3px rgba(197, 48, 48, 0.16) !important;
    }
    .modal-shell {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(42, 34, 24, 0.45);
      backdrop-filter: blur(10px);
      z-index: 9998;
    }
    .modal-shell.open { display: flex; }
    .modal-card {
      width: min(680px, 100%);
      border: 1px solid rgba(216, 196, 167, 0.7);
      border-radius: 20px;
      padding: 18px;
      background:
        radial-gradient(circle at top right, rgba(212, 175, 55, 0.18), transparent 28%),
        linear-gradient(135deg, #fffdfa 0%, #fff6e6 100%);
      box-shadow: 0 24px 60px rgba(47, 34, 18, 0.2);
      animation: toastIn .22s ease;
    }
    .modal-title { margin: 0 0 4px; font-size: 24px; font-family: "Cormorant Garamond", serif; }
    .modal-sub { color: var(--sub); font-size: 12px; margin-bottom: 14px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-grid .span-2 { grid-column: 1 / -1; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
    .modal-error { margin-top: 10px; min-height: 18px; color: var(--bad); font-size: 12px; }
    .auth-box {
      grid-column: 1 / -1;
      border: 1px dashed rgba(176,139,47,.45);
      border-radius: 14px;
      padding: 11px;
      background: rgba(255,255,255,.42);
    }
    .auth-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .auth-actions button { padding: 7px 10px; font-size: 12px; }
    .auth-status { margin-top:8px; color: var(--sub); font-size:12px; line-height:1.45; word-break:break-word; }
    .auth-link-box { display:none; margin-top:9px; padding:8px; border:1px solid rgba(216,196,167,.72); border-radius:10px; background:rgba(255,255,255,.58); }
    .auth-link-box.open { display:block; }
    .auth-bookmarklet { display:inline-block; max-width:100%; margin-top:6px; padding:6px 8px; border-radius:8px; background:#fffaf0; border:1px solid rgba(176,139,47,.30); color:#355c7d; font-size:12px; word-break:break-all; }
    .auth-page-link { display:inline-block; max-width:100%; margin-top:6px; padding:7px 9px; border-radius:8px; background:#355c7d; color:#fff; text-decoration:none; font-size:12px; word-break:break-all; }
    .combo-wrap { position: relative; }
    .combo-wrap input {
      height: 38px;
      padding-right: 46px;
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,253,248,.96));
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .combo-wrap input:focus {
      background: #fffefb;
    }
    .combo-toggle {
      position: absolute;
      right: 7px;
      top: 25px;
      width: 30px;
      height: 30px;
      padding: 0;
      border-radius: 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #5f4e3b;
      background: linear-gradient(135deg, #fffaf0 0%, #ead7af 100%);
      border: 1px solid rgba(216,196,167,.95);
      box-shadow: 0 5px 14px rgba(68, 52, 31, 0.10);
      font-size: 16px;
      line-height: 1;
    }
    .combo-toggle:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #fffdf8 0%, #dfc17b 100%);
      box-shadow: 0 8px 18px rgba(68, 52, 31, 0.14);
    }
    .combo-list {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 40;
      background:
        radial-gradient(circle at top right, rgba(212,175,55,.13), transparent 36%),
        linear-gradient(180deg, rgba(255,253,248,.99), rgba(255,249,237,.99));
      border: 1px solid rgba(216,196,167,.95);
      border-radius: 16px;
      box-shadow: 0 18px 42px rgba(68, 52, 31, 0.18);
      max-height: 230px;
      overflow: auto;
      display: none;
      padding: 7px;
      backdrop-filter: blur(12px);
    }
    .combo-list.open { display: block; animation: comboIn .14s ease; }
    .combo-list::before {
      content: attr(data-combo-label);
      display: block;
      margin: 2px 4px 6px;
      padding: 0 3px;
      color: var(--sub);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .combo-list::-webkit-scrollbar { width: 8px; }
    .combo-list::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(176,139,47,.34);
      border: 2px solid rgba(255,253,248,.95);
    }
    .combo-item {
      position: relative;
      padding: 10px 11px 10px 34px;
      cursor: pointer;
      font-size: 13px;
      border-radius: 12px;
      color: #3a2d1f;
      word-break: break-all;
      display: flex;
      align-items: center;
      min-height: 38px;
      border: 1px solid transparent;
      transition: background .14s ease, border-color .14s ease, transform .14s ease, color .14s ease;
    }
    .combo-item::before {
      content: "⌁";
      position: absolute;
      left: 10px;
      top: 50%;
      width: 16px;
      height: 16px;
      transform: translateY(-50%);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #8a6d3b;
      font-size: 13px;
      background: rgba(212,175,55,.18);
      box-shadow: inset 0 0 0 1px rgba(212,175,55,.24);
    }
    .combo-item:hover, .combo-item.active {
      transform: translateX(2px);
      background: linear-gradient(90deg, rgba(212,175,55,0.18), rgba(53,92,125,0.09));
      border-color: rgba(216,196,167,.72);
      color: #2a2218;
    }
    .combo-empty {
      margin: 2px 0 0;
      padding: 12px;
      color: var(--sub);
      font-size: 12px;
      text-align: center;
      border-radius: 12px;
      background: rgba(255,255,255,.55);
      border: 1px dashed rgba(216,196,167,.75);
    }
    @keyframes comboIn {
      from { opacity: 0; transform: translateY(-4px) scale(.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .token-panel {
      margin-top: 12px;
      border-top: 1px solid rgba(216,196,167,.68);
      padding-top: 12px;
    }
    .token-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .token-title { font-weight: 700; color: #503f2c; }
    .token-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .token-actions button { padding: 6px 9px; font-size: 12px; }
    .token-section-label {
      margin: 8px 0 6px;

function log(msg, cls = '') {
  const ts = new Date().toLocaleString();
  const div = document.createElement('div');
  div.className = `log-item ${cls}`;
  div.textContent = `[${ts}] ${msg}`;
  el.log.prepend(div);
}

function notify(cls, title, body = '') {
  const div = document.createElement('div');
  div.className = `toast ${cls || 'ok'}`;
  div.innerHTML = `<div class="toast-title">${title}</div><div class="toast-body">${body || ''}</div>`;
  el.toastStack.appendChild(div);
  window.setTimeout(() => {
    div.style.opacity = '0';
    div.style.transform = 'translateY(-6px) scale(.98)';
  }, 3200);
  window.setTimeout(() => div.remove(), 3600);
}

function setBusyText(text = '') { el.busy.textContent = text; }

function api(path, opts = {}) {
  return fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts }).then(async (r) => {
    const data = await r.json().catch(() => ({ ok: false, error: '响应不是有效JSON' }));
    if (!r.ok || data.ok === false) {
      const err = new Error(data.error || `HTTP ${r.status}`);
      err.data = data;
      err.status = r.status;
      throw err;
    }
    return data;
  });
}

function quoteText(v) { return (v ?? '').toString(); }
function isMaskedTokenKey(v) { return quoteText(v).includes('*'); }
function formatTokenKey(v) {
  const key = quoteText(v).trim();
  if (!key || isMaskedTokenKey(key)) return '';
  return key.startsWith('sk-') ? key : `sk-${key}`;
}
function escapeHtml(v) {
  return quoteText(v)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function getQuotaPerUnit(sys) { const n = Number(sys?.quota_per_unit); return Number.isFinite(n) && n > 0 ? n : null; }
function getMoneySymbol(sys) {
  const displayType = quoteText(sys?.quota_display_type).trim().toUpperCase();
  if (displayType === 'USD') return '$';
  if (['CNY', 'RMB', 'CNH'].includes(displayType)) return '￥';
  const customSymbol = quoteText(sys?.custom_currency_symbol).trim();
  if (customSymbol && customSymbol !== '¤') return customSymbol;
  return displayType === 'CUSTOM' ? '￥' : '$';
}
function quotaToMoney(rawQuota, sys) { const q = Number(rawQuota); const unit = getQuotaPerUnit(sys); if (!Number.isFinite(q) || !unit) return null; return q / unit; }
function formatMoney(v, sys, withSign = false) { if (!Number.isFinite(v)) return '-'; const symbol = getMoneySymbol(sys); const sign = withSign ? (v >= 0 ? '+' : '') : ''; return `${sign}${symbol}${v.toFixed(2)}`; }
function formatShortTs(ts) { const s = quoteText(ts).trim(); if (!s) return '-'; const m = s.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}:\d{2}:\d{2})$/); return m ? `${m[2]}-${m[3]} ${m[4]}` : s; }
function accountKey(acc) { return String(acc?.account_index || ''); }
function findAccountByKey(key) { return state.accounts.find((a) => accountKey(a) === String(key)) || null; }
function accountLabel(accOrKey) { const acc = typeof accOrKey === 'object' ? accOrKey : findAccountByKey(accOrKey); if (!acc) return `#${accOrKey}`; return `#${displayIndexByKey(accountKey(acc))} ${acc.name || ''}`.trim(); }
function getAccountStatus(acc) { const key = accountKey(acc); return state.statusResults[key] || acc?.last_status || null; }
function getAccountQuotaMoney(acc) {
  const sr = getAccountStatus(acc);
  if (!sr || !(sr.status_state === 'VALID' || sr.session_valid)) return null;
  const money = quotaToMoney(sr?.quota?.quota, sr?.system_status || state.systemStatus);
  return Number.isFinite(money) ? money : null;
}
function maskTag(enabled) { return enabled ? '<span class="tag ok">启用</span>' : '<span class="tag off">停用</span>'; }
function setFieldInvalid(node, invalid) { if (node) node.classList.toggle('input-invalid', !!invalid); }
function clearFieldStates(nodes) { for (const node of nodes) setFieldInvalid(node, false); }

function normalizeBaseUrlInput(value) {
  let v = String(value || '').trim();
  if (!v) return '';
  if (!/^https?:\/\//i.test(v)) v = `https://${v}`;
  try {
    const u = new URL(v);
    u.hash = '';
    u.search = '';
    let out = `${u.protocol}//${u.host}${u.pathname || ''}`;
    out = out.replace(/\/+$/, '');
    return out;
  } catch {
    return v.replace(/\/+$/, '');
  }
}

const PROVIDER_OPTIONS = [
  { value: 'new-api', label: 'new-api' },
  { value: 'sub2api', label: 'sub2api' },
];

function normalizeProvider(value) {
  const v = String(value || '').trim().toLowerCase();
  return PROVIDER_OPTIONS.some((item) => item.value === v) ? v : 'new-api';
}

function parseCookieFields(cookieText = '') {
  const out = { __stripe_mid: '', __stripe_sid: '' };
  for (const part of String(cookieText || '').split(';')) {
    const idx = part.indexOf('=');
    if (idx < 0) continue;
    const key = part.slice(0, idx).trim();
    const value = part.slice(idx + 1).trim();
    if (key === '__stripe_mid' || key === '__stripe_sid') out[key] = value;
  }
  return out;
}

function cleanCookieFieldValue(value, cookieName) {
  let v = String(value || '').trim();
  if (!v) return '';
  const prefix = `${cookieName}=`;
  if (v.startsWith(prefix)) v = v.slice(prefix.length).trim();
  if (v.includes(';')) v = v.split(';')[0].trim();
  return v;
}

function buildCookieFromFields(stripeMid, stripeSid, originalCookie = '') {
  const map = new Map();
  for (const part of String(originalCookie || '').split(';')) {
    const idx = part.indexOf('=');
    if (idx < 0) continue;
    const key = part.slice(0, idx).trim();
    const value = part.slice(idx + 1).trim();
    if (key) map.set(key, value);
  }
  const mid = cleanCookieFieldValue(stripeMid, '__stripe_mid');
  const sid = cleanCookieFieldValue(stripeSid, '__stripe_sid');
  if (mid) map.set('__stripe_mid', mid); else map.delete('__stripe_mid');
  if (sid) map.set('__stripe_sid', sid); else map.delete('__stripe_sid');
  return Array.from(map.entries()).map(([key, value]) => `${key}=${value}`).join('; ');
}

function syncCookieHidden(scope) {
  const isModal = scope === 'modal';
  const cookie = isModal ? el.mCookie : el.fCookie;
  const mid = isModal ? el.mStripeMid : el.fStripeMid;
  const sid = isModal ? el.mStripeSid : el.fStripeSid;
  cookie.value = buildCookieFromFields(mid.value, sid.value, cookie.value);
}

function bindBaseUrlNormalizer(node) {
  const apply = () => {
    const normalized = normalizeBaseUrlInput(node.value);
    if (normalized) node.value = normalized;
    hideComboLists();
  };
  node.addEventListener('focus', () => showComboList(node));
  node.addEventListener('input', () => showComboList(node));
  node.addEventListener('blur', apply);
  node.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      apply();
      node.blur();
    }
    if (e.key === 'Escape') hideComboLists();
  });
}

function renderKnownBaseUrls(filterValue = '') {
  const lists = [
    { input: el.fBaseUrl, list: el.fBaseUrlList },
    { input: el.mBaseUrl, list: el.mBaseUrlList },
  ];
  const normalizedFilter = String(filterValue || '').trim().toLowerCase();
  const sourceUrls = [...new Set(state.knownBaseUrls.map((url) => normalizeBaseUrlInput(url)).filter(Boolean))];
  for (const { input, list } of lists) {
    if (!list) continue;
    const needle = normalizedFilter || String(input?.value || '').trim().toLowerCase();
    const urls = sourceUrls.filter((url) => !needle || String(url).toLowerCase().includes(needle));
    list.innerHTML = '';
    if (!urls.length) {
      const empty = document.createElement('div');
      empty.className = 'combo-empty';
      empty.textContent = state.knownBaseUrls.length ? '没有匹配的本地地址' : '暂无本地地址';
      list.appendChild(empty);
      continue;
    }
    for (const url of urls) {
      const item = document.createElement('div');
      item.className = 'combo-item';
      item.setAttribute('role', 'option');
      item.textContent = url;
      item.addEventListener('mousedown', (e) => {
        e.preventDefault();
        if (input) {
          input.value = normalizeBaseUrlInput(url);
          setFieldInvalid(input, false);
          if (input === el.mBaseUrl) el.modalError.textContent = '';
          hideComboLists();
          input.focus();
        }
      });
      list.appendChild(item);
    }
  }
}

function renderProviderList(input, list) {
  if (!list) return;
  const current = normalizeProvider(input?.value);
  list.innerHTML = '';
  for (const item of PROVIDER_OPTIONS) {
    const row = document.createElement('div');
    row.className = `combo-item ${item.value === current ? 'active' : ''}`;
    row.setAttribute('role', 'option');
    row.textContent = item.label;
    row.addEventListener('mousedown', (e) => {
      e.preventDefault();
      if (!input) return;
      input.value = item.value;
      hideComboLists();
      updateProviderHints(input === el.mProvider ? 'modal' : 'edit');
      input.focus();
    });
    list.appendChild(row);
  }
}

function hideComboLists() {
  for (const list of [el.fBaseUrlList, el.mBaseUrlList, el.fProviderList, el.mProviderList]) if (list) list.classList.remove('open');
}

function showComboList(node) {
  const isProvider = node === el.fProvider || node === el.mProvider;
  const list = node === el.fBaseUrl ? el.fBaseUrlList : node === el.mBaseUrl ? el.mBaseUrlList : node === el.fProvider ? el.fProviderList : el.mProviderList;
  hideComboLists();
  if (isProvider) renderProviderList(node, list);
  else renderKnownBaseUrls(node.value);
  if (list) list.classList.add('open');
}

function bindProviderCombo(node) {
  node.addEventListener('focus', () => showComboList(node));
  node.addEventListener('click', () => showComboList(node));
  node.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      showComboList(node);
    }
    if (e.key === 'Escape') hideComboLists();
  });
}

function setEditFormDisabled(disabled) {

function buildPayloadFromInputs(fields) {
  if (fields.stripeMid && fields.stripeSid) {
    fields.cookie.value = buildCookieFromFields(fields.stripeMid.value, fields.stripeSid.value, fields.cookie.value);
  }
  return {
    name: fields.name.value.trim(),
    base_url: normalizeBaseUrlInput(fields.baseUrl.value),
    provider: normalizeProvider(fields.provider.value),
    new_api_user: fields.user.value.trim(),
    session: fields.session.value.trim().replace(/^Bearer\s+/i, ''),
    cookie: fields.cookie.value.trim(),
    enabled: !!fields.enabled.checked,
  };
}

function validatePayload(payload, fields) {
  const errors = [];
  clearFieldStates([fields.name, fields.baseUrl, fields.user, fields.session, fields.cookie]);
  if (!payload.name) { errors.push('账号名不能为空'); setFieldInvalid(fields.name, true); }
  if (payload.provider === 'new-api' && payload.new_api_user && !/^\d+$/.test(payload.new_api_user)) { errors.push('new_api_user 只能是数字'); setFieldInvalid(fields.user, true); }
  if (!payload.base_url) { errors.push('域名地址不能为空'); setFieldInvalid(fields.baseUrl, true); }
  else if (!/^https?:\/\/.+/.test(payload.base_url)) { errors.push('域名地址格式不正确'); setFieldInvalid(fields.baseUrl, true); }
  if (!payload.session) { errors.push('Session 不能为空'); setFieldInvalid(fields.session, true); }
  else if (/\s/.test(payload.session) || payload.session.length < (payload.provider === 'sub2api' ? 30 : 20)) { errors.push('Session / Bearer Token 不能包含空白字符，且长度不能过短'); setFieldInvalid(fields.session, true); }
  return errors;
}

function renderRowSummary(key) {
  if (state.pendingAccounts[key]) {
    return {
      checkinText: state.pendingAccounts[key] === 'checkin' ? '处理中...' : (state.signinStatus[key] || '未签到'),
      statusText: state.pendingAccounts[key] === 'status' ? '处理中...' : '-',
    };
  }
  const s = state.statusResults[key];
  const checkinText = state.signinStatus[key] || '未签到';
  let statusText = '-';
  if (s) {
    statusText = (s.status_state === 'VALID' || s.session_valid) ? '有效' : '异常';
    if (statusText === '异常') {
      console.warn('账号检测异常', s.account || '', s.api_error || '', s);
    }
  }
  return { checkinText, statusText };
}

function displayIndexByKey(key) {
  const idx = state.accounts.findIndex((acc) => accountKey(acc) === String(key));
  return idx >= 0 ? idx + 1 : '-';
}

function attachDragEvents(tr, key) {
  tr.draggable = true;
  tr.addEventListener('dragstart', (e) => {
    state.dragKey = key;
    tr.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', key);
  });
  tr.addEventListener('dragend', () => {
    state.dragKey = null;
    tr.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
    for (const row of el.body.querySelectorAll('tr')) row.classList.remove('drag-over-top', 'drag-over-bottom');
  });
  tr.addEventListener('dragover', (e) => {
    e.preventDefault();
    if (!state.dragKey || state.dragKey === key) return;
    const rect = tr.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;
    tr.classList.toggle('drag-over-top', before);
    tr.classList.toggle('drag-over-bottom', !before);
  });
  tr.addEventListener('dragleave', () => {
    tr.classList.remove('drag-over-top', 'drag-over-bottom');
  });
  tr.addEventListener('drop', async (e) => {
    e.preventDefault();
    tr.classList.remove('drag-over-top', 'drag-over-bottom');
    const fromKey = state.dragKey || e.dataTransfer.getData('text/plain');
    if (!fromKey || fromKey === key) return;
    const rect = tr.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;
    await reorderAccounts(fromKey, key, before);
  });
}

function getGroupedAccounts() {
  const map = new Map();
  for (const acc of state.accounts) {
    const url = normalizeBaseUrlInput(acc.base_url || state.defaultBaseUrl || '未设置地址') || '未设置地址';
    if (!map.has(url)) map.set(url, []);
    map.get(url).push(acc);
  }
  return Array.from(map.entries()).map(([baseUrl, accounts]) => ({ baseUrl, accounts }));
}

function getGroupByBaseUrl(baseUrl) {
  const normalized = normalizeBaseUrlInput(baseUrl);
  return getGroupedAccounts().find((item) => item.baseUrl === normalized) || null;
}

function isSub2apiOnlySite(baseUrl) {
  const group = getGroupByBaseUrl(baseUrl);
  return !!group && group.accounts.length > 0 && group.accounts.every((acc) => normalizeProvider(acc.provider || 'new-api') === 'sub2api');
}

function groupKeyFromUrl(url) { return `base:${url}`; }

function accountCheckinUnsupported(acc) {
  const key = accountKey(acc);
  if ((state.signinStatus[key] || acc.signin_status) === '不可签到') return true;
  if (state.checkinResults[key]?.state === 'UNSUPPORTED') return true;
  const status = getAccountStatus(acc);
  return status?.system_status?.checkin_enabled === false;
}

function isGroupCheckinUnsupported(accounts) {
  return accounts.some(accountCheckinUnsupported);
}

function markAccountSiteCheckinUnsupported(key) {
  const account = findAccountByKey(key);
  if (!account) return;
  const baseUrl = normalizeBaseUrlInput(account.base_url || state.defaultBaseUrl);
  for (const item of state.accounts) {
    if (normalizeBaseUrlInput(item.base_url || state.defaultBaseUrl) !== baseUrl) continue;
    state.signinStatus[accountKey(item)] = '不可签到';
  }
}

function getGroupStats(accounts) {
  let enabled = 0, signed = 0, valid = 0;
  let totalMoney = 0, totalPreviousChange = 0, totalYesterdayChange = 0;
  let hasMoney = false, hasPreviousChange = false, hasYesterdayChange = false, systemStatus = null;
  const checkinUnsupported = isGroupCheckinUnsupported(accounts);
  for (const acc of accounts) {
    const key = accountKey(acc);
    if (acc.enabled) enabled += 1;
    if ((state.signinStatus[key] || acc.signin_status) === '已签到') signed += 1;
    const sr = getAccountStatus(acc);
    if (sr && (sr.status_state === 'VALID' || sr.session_valid)) {
      valid += 1;
      const sys = sr?.system_status || state.systemStatus;
      if (!systemStatus && sys) systemStatus = sys;
      const money = quotaToMoney(sr?.quota?.quota, sys);
      if (Number.isFinite(money)) { totalMoney += money; hasMoney = true; }
      const previousChange = quotaToMoney(sr?.quota_delta?.change_from_previous, sys);
      if (Number.isFinite(previousChange)) { totalPreviousChange += previousChange; hasPreviousChange = true; }
      const yesterdayChange = quotaToMoney(sr?.yesterday_delta?.change_from_yesterday_last, sys);
      if (Number.isFinite(yesterdayChange)) { totalYesterdayChange += yesterdayChange; hasYesterdayChange = true; }
    }
  }
  return {
    enabled,
    signed,
    valid,
    totalMoney: hasMoney ? totalMoney : null,
    totalPreviousChange: hasPreviousChange ? totalPreviousChange : null,
    totalYesterdayChange: hasYesterdayChange ? totalYesterdayChange : null,
    systemStatus,
    checkinUnsupported,
  };
}

function renderGroupRow(group) {
  const key = groupKeyFromUrl(group.baseUrl);
  const collapsed = !!state.collapsedGroups[key];
  const stats = getGroupStats(group.accounts);
  const tr = document.createElement('tr');
  tr.className = 'group-row';
  if (state.selectedSite === group.baseUrl) tr.classList.add('selected');
  tr.title = '单击查看地址详情，双击展开或折叠';
  tr.addEventListener('click', (e) => {
    if (e.target.closest('button')) return;
    selectSite(group.baseUrl);
  });
  tr.addEventListener('dblclick', (e) => {
    if (e.target.closest('button')) return;
    state.collapsedGroups[key] = !state.collapsedGroups[key];
    renderTable();
  });
  tr.innerHTML = `
    <td class="group-cell" colspan="8">
      <div class="group-box">
        <div class="group-main">
          <button type="button" class="fold-btn" data-group-action="toggle" data-group-key="${key}" title="${collapsed ? '展开' : '折叠'}">
            <span class="fold-icon ${collapsed ? '' : 'expanded'}" aria-hidden="true"></span>
          </button>
          <span class="group-url mono">${group.baseUrl}</span>
          <span class="group-stats">
            <span class="group-stat">账号数 ${group.accounts.length}</span>
            <span class="group-stat">可用数 ${stats.valid}</span>
            <span class="group-stat">${stats.checkinUnsupported ? '不可签到' : `今日签到数 ${stats.signed}`}</span>
            <span class="group-stat">总额度 ${formatMoney(stats.totalMoney, stats.systemStatus || state.systemStatus)}</span>
          </span>
        </div>
        <div class="group-actions">
          <button type="button" data-group-action="checkin" data-group-key="${key}" ${stats.checkinUnsupported ? 'disabled title="该网站不支持签到"' : ''}>${stats.checkinUnsupported ? '不可签到' : '全部签到'}</button>
          <button type="button" class="secondary" data-group-action="status" data-group-key="${key}">全部检测</button>
        </div>
      </div>
    </td>`;
  return tr;
}

function renderTable() {
  el.body.innerHTML = '';
  for (const group of getGroupedAccounts()) {
    const groupKey = groupKeyFromUrl(group.baseUrl);
    const groupCheckinUnsupported = isGroupCheckinUnsupported(group.accounts);
    el.body.appendChild(renderGroupRow(group));
    if (state.collapsedGroups[groupKey]) continue;

    group.accounts.forEach((acc) => {
      const key = accountKey(acc);
      const index = state.accounts.findIndex((item) => accountKey(item) === key);
      const tr = document.createElement('tr');
      if (state.selected && accountKey(state.selected) === key) tr.classList.add('selected');
      tr.addEventListener('click', () => selectAccount(key));
      attachDragEvents(tr, key);

      const running = !!state.pendingAccounts[key];
      const rowSum = renderRowSummary(key);
      const activeAction = state.pendingAccounts[key];
      const checkinDisabled = groupCheckinUnsupported || accountCheckinUnsupported(acc);
      if (checkinDisabled) rowSum.checkinText = '不可签到';
      const checkinLabel = checkinDisabled ? '不可签到' : (activeAction === 'checkin' ? '签到中' : '签到');
      const statusLabel = activeAction === 'status' ? '检测中' : '检测';
      const deleteLabel = activeAction === 'delete' ? '处理中' : '删除';

      tr.innerHTML = `
        <td class="drag-handle" aria-label="排序">☰</td>
        <td class="mono">${index + 1}</td>
        <td>${acc.name || ''}</td>
        <td>${running ? '<span class="tag run">处理中</span>' : maskTag(acc.enabled)}</td>
        <td class="mono">${acc.provider || 'new-api'}${acc.new_api_user ? ' / ' + acc.new_api_user : ''}</td>
        <td class="small">${rowSum.checkinText}</td>
        <td class="small status-short" title="${(state.statusResults[key]?.api_error || '').replace(/"/g, '&quot;')}">${rowSum.statusText}</td>
        <td>
          <div class="row-actions">
            <button data-action="checkin" data-key="${key}" class="${activeAction === 'checkin' ? 'busy-button' : ''}" ${(running || checkinDisabled) ? 'disabled' : ''} ${checkinDisabled ? 'title="该网站不支持签到"' : ''}>${checkinLabel}</button>
            <button data-action="status" data-key="${key}" class="secondary ${activeAction === 'status' ? 'busy-button' : ''}" ${running ? 'disabled' : ''}>${statusLabel}</button>
            <button data-action="delete" data-key="${key}" class="bad ${activeAction === 'delete' ? 'busy-button' : ''}" ${running ? 'disabled' : ''}>${deleteLabel}</button>
          </div>
        </td>
      `;
      el.body.appendChild(tr);
    });
  }

  for (const btn of el.body.querySelectorAll('button[data-action]')) {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const key = btn.dataset.key;
      if (action === 'checkin') await withAccountBusy(key, 'checkin', () => checkinOne(key));
      if (action === 'status') await withAccountBusy(key, 'status', () => statusOne(key));
      if (action === 'delete') await withAccountBusy(key, 'delete', () => deleteOne(key));
    });
  }

  for (const btn of el.body.querySelectorAll('button[data-group-action]')) {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = btn.dataset.groupAction;
      const key = btn.dataset.groupKey;
      const group = getGroupedAccounts().find((g) => groupKeyFromUrl(g.baseUrl) === key);
      if (!group) return;
      if (action === 'toggle') {
        state.collapsedGroups[key] = !state.collapsedGroups[key];
        renderTable();
        return;
      }
      if (action === 'checkin') {
        await runGroupCheckin(group);
        return;
      }
      if (action === 'status') {
        await runGroupStatus(group);
        return;
      }
    });
  }
}

function metricTone(value) { const n = Number(value); if (!Number.isFinite(n)) return 'metric-neutral'; if (n > 0) return 'metric-positive'; if (n < 0) return 'metric-negative'; return 'metric-neutral'; }
function flashDetail() { el.detailStatus.classList.remove('flash'); void el.detailStatus.offsetWidth; el.detailStatus.classList.add('flash'); }
function fitMetricValues() {
  for (const node of el.detailStatus.querySelectorAll('.metric-value')) {
    node.style.fontSize = '';
    let size = Number.parseFloat(window.getComputedStyle(node).fontSize) || 24;
    while (node.scrollWidth > node.clientWidth && size > 16) {
      size -= 1;
      node.style.fontSize = `${size}px`;
    }
  }
}

function tokenBusyText(key) {
  const busy = state.tokenLoading[key];
  if (busy === 'create') return '创建中...';
  if (busy === 'delete') return '删除中...';
  if (busy) return '加载中...';
  return '';
}

function ensureSelectedTokenGroup(key) {
  const groups = state.tokenGroups[key] || [];
  if (!state.selectedTokenGroup[key] && groups.length) state.selectedTokenGroup[key] = groups[0].id;
}

function tokenGroupsReady(key) {
  const groups = state.tokenGroups[key];
  const busy = state.tokenLoading[key];
  const selectedGroup = state.selectedTokenGroup[key] || '';
  return Array.isArray(groups)
    && groups.some((group) => group.id === selectedGroup)
    && !['groups', 'load', 'create'].includes(busy);
}

function tokenRevealMap(key) {
  if (!state.tokenRevealing[key]) state.tokenRevealing[key] = {};
  return state.tokenRevealing[key];
}

function tokenNeedsReveal(token) {
  return !!(token && token.id && !formatTokenKey(token.key));
}

function tokenDisplayKey(key, token) {
  const fullKey = formatTokenKey(token.key);
  if (fullKey) return fullKey;
  if (tokenRevealMap(key)[token.id]) return '正在获取完整令牌...';
  return token.id ? '完整令牌未展开，点击复制会重新获取。' : '接口未返回 key。';
}

function renderTokenPanel(acc) {
  const panel = document.getElementById('token-panel');
  if (!panel || !acc) return;
  const key = accountKey(acc);
  const tokens = state.tokens[key] || [];
  const busy = tokenBusyText(key);
  const tokenBusy = !!state.tokenLoading[key];
  const tokenHtml = tokens.length ? tokens.map((token) => `
    <div class="token-row">
      <div class="token-meta">
        <div class="token-name">${escapeHtml(token.name || `令牌 ${token.id || ''}`)}</div>
        <div class="token-key mono">${escapeHtml(tokenDisplayKey(key, token))}</div>
        <div class="token-group">分组：${escapeHtml(token.group || '-')}</div>
      </div>
      <div class="token-row-actions">
        <button type="button" class="secondary" data-token-id="${escapeHtml(token.id ?? '')}" data-token-copy="${escapeHtml(formatTokenKey(token.key))}" ${token.id ? '' : 'disabled'}>复制</button>
        <button type="button" class="bad" data-token-delete="${escapeHtml(token.id ?? '')}" ${token.id ? '' : 'disabled'}>删除</button>
      </div>
    </div>
  `).join('') : `<div class="token-empty">${busy || '暂无令牌。'}</div>`;
  panel.innerHTML = `
    <div class="token-head">
      <div class="token-title">令牌管理</div>
      <div class="token-actions">
        <button type="button" id="btn-token-open" ${tokenBusy ? 'disabled' : ''}>添加令牌</button>
        <button type="button" class="secondary" id="btn-token-refresh">${busy || '刷新令牌'}</button>
      </div>
    </div>
    <div class="token-section-label">已创建令牌</div>
    <div class="token-list">${tokenHtml}</div>
  `;
  const openBtn = panel.querySelector('#btn-token-open');
  if (openBtn) openBtn.addEventListener('click', () => openTokenModal(key).catch(handleTokenError(key)));
  const refreshBtn = panel.querySelector('#btn-token-refresh');
  if (refreshBtn) refreshBtn.addEventListener('click', () => loadTokenData(key, true).catch(handleTokenError(key)));
  for (const btn of panel.querySelectorAll('[data-token-copy]')) {
    btn.addEventListener('click', () => copyTokenForAccount(key, btn.dataset.tokenId, btn.dataset.tokenCopy || '').catch(handleTokenError(key)));
  }
  for (const btn of panel.querySelectorAll('[data-token-delete]')) {
    btn.addEventListener('click', () => deleteTokenForAccount(key, btn.dataset.tokenDelete).catch(handleTokenError(key)));
  }
}

function handleTokenError(key) {
  return (e) => {
    delete state.tokenLoading[key];
    renderDetail();
    renderTokenModalGroups(key);
    log(`${accountLabel(key)} 令牌操作失败：${e.message || e}`, 'bad2');
    notify('bad2', '令牌操作失败', `${accountLabel(key)}：${e.message || e}`);
  };
}

async function revealTokenKey(key, tokenId) {
  if (!tokenId) return '';
  const revealMap = tokenRevealMap(key);
  revealMap[tokenId] = true;
  renderDetail();
  try {
    const data = await api(`/api/accounts/${encodeURIComponent(key)}/tokens/${encodeURIComponent(tokenId)}/key`, { method: 'POST' });
    const fullKey = formatTokenKey(data.key || '');
    if (fullKey) {
      state.tokens[key] = (state.tokens[key] || []).map((token) => (
        String(token.id) === String(tokenId) ? { ...token, key: fullKey } : token
      ));
    }
    return fullKey;
  } finally {
    delete revealMap[tokenId];
    renderDetail();
  }
}

async function revealTokenKeys(key) {
  const tokens = state.tokens[key] || [];
  const pending = tokens.filter(tokenNeedsReveal);
  const batchSize = 3;
  for (let i = 0; i < pending.length; i += batchSize) {
    await Promise.all(pending.slice(i, i + batchSize).map((token) => revealTokenKey(key, token.id).catch(() => '')));
  }
}

function revealTokenKeysInBackground(key) {
  const tokens = state.tokens[key] || [];
  const pending = tokens.filter(tokenNeedsReveal);
  if (!pending.length) return;
  revealTokenKeys(key).then(() => renderDetail()).catch(handleTokenError(key));
}

function tokenApiPath(key, path, force = false) {
  const suffix = force ? '?force=1' : '';
  return `/api/accounts/${encodeURIComponent(key)}/${path}${suffix}`;
}

async function loadTokenGroups(key, force = false) {
  if (!force && state.tokenGroups[key]) return;
  state.tokenLoading[key] = 'groups';
  renderTokenModalGroups(key);
  const groupData = await api(tokenApiPath(key, 'token-groups', force));
  state.tokenGroups[key] = Array.isArray(groupData.groups) ? groupData.groups : [];
  ensureSelectedTokenGroup(key);
  delete state.tokenLoading[key];
  renderTokenModalGroups(key);
}

async function loadTokenData(key, force = false, { reveal = true, waitForReveal = false } = {}) {
  if (!force && state.tokenGroups[key] && state.tokens[key]) return;
  state.tokenLoading[key] = 'load';
  renderDetail();
  const [groupData, tokenData] = await Promise.all([
    api(tokenApiPath(key, 'token-groups', force)),
    api(tokenApiPath(key, 'tokens', force)),
  ]);
  state.tokenGroups[key] = Array.isArray(groupData.groups) ? groupData.groups : [];
  state.tokens[key] = Array.isArray(tokenData.tokens)
    ? tokenData.tokens.map((token) => ({ ...token, key: formatTokenKey(token.key) }))
    : [];
  ensureSelectedTokenGroup(key);
  delete state.tokenLoading[key];
  renderDetail();
  renderTokenModalGroups(key);
  if (reveal) {
    if (waitForReveal) await revealTokenKeys(key);
    else revealTokenKeysInBackground(key);
  }
}

function renderTokenModalGroups(key) {
  if (!el.tokenModalGroups) return;
  const groups = state.tokenGroups[key] || [];
  const selectedGroup = state.selectedTokenGroup[key] || '';
  const busy = tokenBusyText(key);
  const loadingGroups = ['groups', 'load'].includes(state.tokenLoading[key]);
  el.btnTokenModalSave.disabled = !tokenGroupsReady(key);
  el.btnTokenModalSave.textContent = loadingGroups ? '加载分组中' : '创建令牌';
  el.tokenModalGroups.innerHTML = groups.length ? groups.map((group) => `
    <button type="button" class="token-group-item ${group.id === selectedGroup ? 'active' : ''}" data-token-modal-group="${escapeHtml(group.id)}">
      <div class="token-group-id">${escapeHtml(group.id)}</div>
      <div class="token-group-desc">${escapeHtml(group.desc || '无描述')}</div>
      <div class="token-group-ratio">倍率：${escapeHtml(group.ratio ?? '-')}</div>
    </button>
  `).join('') : `<div class="token-empty">${busy || '暂无分组，点击刷新令牌重试。'}</div>`;
  for (const btn of el.tokenModalGroups.querySelectorAll('[data-token-modal-group]')) {
    btn.addEventListener('click', () => {
      state.selectedTokenGroup[key] = btn.dataset.tokenModalGroup || '';
      renderTokenModalGroups(key);
    });
  }
}

async function openTokenModal(key) {
  state.tokenModalKey = key;
  el.tokenModalName.value = '';
  el.tokenModalError.textContent = '';
  el.tokenModalSub.textContent = `${accountLabel(key)}：选择分组并填写令牌名称。`;
  el.tokenModal.classList.add('open');
  el.tokenModal.setAttribute('aria-hidden', 'false');
  await loadTokenGroups(key);
  renderTokenModalGroups(key);
  window.setTimeout(() => el.tokenModalName.focus(), 30);
}

function closeTokenModal() {
  state.tokenModalKey = null;
  el.tokenModal.classList.remove('open');
  el.tokenModal.setAttribute('aria-hidden', 'true');
  el.tokenModalError.textContent = '';
}

function closeConfirmDialog(result) {
  if (!el.confirmModal.classList.contains('open')) return;
  el.confirmModal.classList.remove('open');
  el.confirmModal.setAttribute('aria-hidden', 'true');
  const resolver = state.confirmResolver;
  state.confirmResolver = null;
  if (resolver) resolver(!!result);
}

function showConfirmDialog({ title = '确认操作', message = '', okText = '确定', cancelText = '取消', danger = true } = {}) {
  if (state.confirmResolver) closeConfirmDialog(false);
  return new Promise((resolve) => {
    state.confirmResolver = resolve;
    el.confirmTitle.textContent = title;
    el.confirmMessage.textContent = message;
    el.btnConfirmOk.textContent = okText;
    el.btnConfirmCancel.textContent = cancelText;
    el.btnConfirmOk.classList.toggle('bad', !!danger);
    el.btnConfirmOk.classList.toggle('warn', !danger);
    el.confirmModal.classList.add('open');
    el.confirmModal.setAttribute('aria-hidden', 'false');
    window.setTimeout(() => el.btnConfirmCancel.focus(), 30);
  });
}

async function createTokenForAccount(key, name) {
  const group = state.selectedTokenGroup[key] || '';
  if (!name) { notify('warn2', '请输入令牌名称', '创建令牌前需要填写名称。'); return; }
  if (!group) { notify('warn2', '请选择分组', '创建令牌前需要先选择一个分组。'); return; }
  state.tokenLoading[key] = 'create';
  closeTokenModal();
  renderDetail();
  renderTokenModalGroups(key);
  notify('warn2', '正在创建令牌', `${name} 正在创建到分组 ${group}。`);
  try {
    const data = await api(`/api/accounts/${encodeURIComponent(key)}/tokens`, {
      method: 'POST',
      body: JSON.stringify({ name, group }),
    });
    if (data.token && data.token.key) {
      state.tokens[key] = [{ ...data.token, key: formatTokenKey(data.token.key) }, ...(state.tokens[key] || [])];
    }
    log(`${accountLabel(key)} 已创建令牌：${name} / ${group}`, 'ok');
    notify('ok', '令牌已创建', `${name} 已创建到分组 ${group}。`);
    loadTokenData(key, true).catch(handleTokenError(key));
  } catch (e) {
    if (e.data?.groups_refreshed && Array.isArray(e.data.groups)) {
      state.tokenGroups[key] = e.data.groups;
      if (!state.tokenGroups[key].some((item) => item.id === state.selectedTokenGroup[key])) {
        state.selectedTokenGroup[key] = '';
      }
      ensureSelectedTokenGroup(key);
      state.tokenModalKey = key;
      el.tokenModalName.value = name;
      el.tokenModalSub.textContent = `${accountLabel(key)}：分组已刷新，请重新选择后创建。`;
      el.tokenModal.classList.add('open');
      el.tokenModal.setAttribute('aria-hidden', 'false');
      el.tokenModalError.textContent = '原分组不可用，已刷新分组列表，请重新选择。';
      renderTokenModalGroups(key);
      notify('warn2', '分组已刷新', '原分组不可用，请重新选择分组后创建。');
    }
    log(`${accountLabel(key)} 创建令牌失败：${e.message || e}`, 'bad2');
    notify('bad2', '令牌创建失败', `${name}：${e.message || e}`);
  } finally {
    if (state.tokenLoading[key] === 'create') delete state.tokenLoading[key];
    renderDetail();
    renderTokenModalGroups(key);
  }
}

async function saveTokenModal() {
  const key = state.tokenModalKey;
  if (!key) return;
  if (!tokenGroupsReady(key)) {
    el.tokenModalError.textContent = state.tokenLoading[key] ? '请等待分组加载完成后再创建' : '请先选择一个可用分组';
    return;
  }
  const name = String(el.tokenModalName.value || '').trim();
  if (!name) {
    el.tokenModalError.textContent = '令牌名称不能为空';
    setFieldInvalid(el.tokenModalName, true);
    return;
  }
  el.tokenModalError.textContent = '';
  setFieldInvalid(el.tokenModalName, false);
  await createTokenForAccount(key, name);
}

async function copyTokenForAccount(key, tokenId, fallbackKey = '') {
  const fullKey = tokenId ? await revealTokenKey(key, tokenId) : '';
  renderDetail();
  const copyValue = formatTokenKey(fullKey || fallbackKey);
  if (!copyValue) {
    notify('warn2', '完整令牌未获取', '接口暂时没有返回完整令牌，请刷新令牌后重试。');
    return;
  }
  await copyText(copyValue, '令牌已复制');
}

async function deleteTokenForAccount(key, tokenId) {
  if (!tokenId) return;
  const confirmed = await showConfirmDialog({
    title: '删除令牌',
    message: `确定删除令牌 #${tokenId} 吗？`,
    okText: '删除',
  });
  if (!confirmed) return;
  state.tokenLoading[key] = 'delete';
  renderDetail();
  await api(`/api/accounts/${encodeURIComponent(key)}/tokens/${encodeURIComponent(tokenId)}`, { method: 'DELETE' });
  state.tokens[key] = (state.tokens[key] || []).filter((token) => String(token.id) !== String(tokenId));
  delete state.tokenLoading[key];
  renderDetail();
  log(`${accountLabel(key)} 已删除令牌 #${tokenId}`, 'ok');
  notify('ok', '令牌已删除', `令牌 #${tokenId} 已删除。`);
}

async function loadSiteInfo(baseUrl) {
  const normalized = normalizeBaseUrlInput(baseUrl);
  if (!normalized || state.siteLoading[normalized] === 'info') return;
  state.siteLoading[normalized] = 'info';
  renderDetail();
  try {
    const data = await api(`/api/sites/info?base_url=${encodeURIComponent(normalized)}`);
    state.siteInfo[normalized] = data.site || {};
    renderDetail();
    if (!data.site?.models_loaded && !isSub2apiOnlySite(normalized)) await refreshSiteModels(normalized, true);
  } catch (e) {
    log(`${normalized} 地址信息加载失败：${e.message || e}`, 'bad2');
    notify('bad2', '地址信息加载失败', `${normalized}：${e.message || e}`);
  } finally {
    if (state.siteLoading[normalized] === 'info') delete state.siteLoading[normalized];
    renderDetail();
  }
}

async function saveSiteRemark(baseUrl) {
  const normalized = normalizeBaseUrlInput(baseUrl);
  const textarea = el.detailStatus.querySelector('[data-site-remark]');
  const remark = String(textarea?.value || '').trim();
  if (remark.length > 500) {
    notify('warn2', '备注过长', '地址备注不能超过 500 个字符。');
    return;
  }
  state.siteLoading[normalized] = 'remark';
  renderDetail();
  try {
    const data = await api('/api/sites/info', {
      method: 'PUT',
      body: JSON.stringify({ base_url: normalized, remark }),
    });
    state.siteInfo[normalized] = data.site || {};
    log(`${normalized} 地址备注已保存`, 'ok');
    notify('ok', '地址备注已保存', normalized);
  } finally {
    delete state.siteLoading[normalized];
    renderDetail();
  }
}

async function refreshSiteModels(baseUrl, automatic = false) {
  const normalized = normalizeBaseUrlInput(baseUrl);
  if (!normalized || state.siteLoading[normalized] === 'models') return;
  state.siteLoading[normalized] = 'models';
  renderDetail();
  if (!automatic) notify('warn2', '正在检测模型', `${normalized} 正在读取支持的模型。`);
  try {
    const data = await api('/api/sites/models', {
      method: 'POST',
      body: JSON.stringify({ base_url: normalized }),
    });
    state.siteInfo[normalized] = data.site || {};
    log(`${normalized} 模型列表已更新，共 ${data.models?.length || 0} 个`, 'ok');
    notify('ok', '模型列表已更新', `${normalized}：${data.models?.length || 0} 个匹配模型。`);
  } catch (e) {
    log(`${normalized} 模型检测失败：${e.message || e}`, 'bad2');
    notify('bad2', '模型检测失败', `${normalized}：${e.message || e}`);
  } finally {
    delete state.siteLoading[normalized];
    renderDetail();
  }
}

function renderDetail() {

    renderSiteDetail();

    el.detailContent.style.display = 'none';
    el.accountEditSection.style.display = 'block';

  el.detailEmpty.style.display = 'none';
  el.detailContent.style.display = 'block';
  el.accountEditSection.style.display = 'block';
  const acc = state.selected;
  const key = accountKey(acc);

  const signState = state.signinStatus[key] || '未签到';
  const identity = sr?.identity || {};
  const sys = sr?.system_status || state.systemStatus;
  const q = sr?.quota || {};
  const delta = sr?.quota_delta || {};
  const yesterday = sr?.yesterday_delta || {};

  const changeMoney = sr?.session_valid ? quotaToMoney(delta.change_from_previous, sys) : null;
  const yesterdayMoney = sr?.session_valid ? quotaToMoney(yesterday.change_from_yesterday_last, sys) : null;

      <div class="metric-card">

    ${sr && !sr.session_valid ? `<div class="small bad2" style="margin-top:8px; word-break:break-word;">异常信息：${sr.api_error || '接口返回异常'}<\/div>` : ''}
    <div id="token-panel" class="token-panel"></div>
  `;

    copyAddressButton.addEventListener('click', () => copyText(acc.base_url || '', '地址已复制'));

}

function selectAccount(key) {
  state.selectedSite = null;
  state.selected = findAccountByKey(key);
  if (state.selected) fillForm(state.selected);
  renderTable();
  renderDetail();
  if (state.selected) loadTokenData(key).catch((e) => {
    log(`${accountLabel(key)} 令牌加载失败：${e.message || e}`, 'bad2');
    notify('bad2', '令牌加载失败', `${accountLabel(key)}：${e.message || e}`);
  });
}

function selectSite(baseUrl) {
  const normalized = normalizeBaseUrlInput(baseUrl);
  state.selectedSite = normalized;
  state.selected = null;
  fillForm(null);
  renderTable();
  renderDetail();
  loadSiteInfo(normalized);
}

async function refreshAccounts() {
  const data = await api('/api/accounts');
  state.accounts = data.accounts || [];
  for (const group of getGroupedAccounts()) {
    const key = groupKeyFromUrl(group.baseUrl);
    if (!(key in state.collapsedGroups)) state.collapsedGroups[key] = true;
  }
  state.defaultBaseUrl = data.default_base_url || state.defaultBaseUrl;
  state.knownBaseUrls = Array.isArray(data.known_base_urls) ? data.known_base_urls : [];
  renderKnownBaseUrls();
  state.signinStatus = {};
  state.statusResults = {};
  for (const acc of state.accounts) {
    const key = accountKey(acc);
    state.signinStatus[key] = acc.signin_status || '未签到';
    if (acc.last_status && typeof acc.last_status === 'object') state.statusResults[key] = acc.last_status;
  }
  if (state.selected) state.selected = findAccountByKey(accountKey(state.selected));
  renderTable();
  renderDetail();
}

function setButtonBusy(button, busy, busyText = '') {
  if (!button) return;
  if (busy) {
    if (!button.dataset.label) button.dataset.label = button.textContent;
    button.textContent = busyText || button.textContent;
    button.classList.add('busy-button');
    button.disabled = true;
    return;
  }
  button.textContent = button.dataset.label || button.textContent;
  button.classList.remove('busy-button');
  button.disabled = false;
}

async function withGlobalBusy(text, button, busyText, fn) {

  for (const btn of [el.btnRefresh, el.btnCheckinAll, el.btnStatusAll, el.btnNew, el.btnSortDir, el.btnApplySort]) if (btn && btn !== button) btn.disabled = true;
  setBusyText(`正在执行：${text}`);
  try { await fn(); } finally {

    setButtonBusy(button, false);
    for (const btn of [el.btnRefresh, el.btnCheckinAll, el.btnStatusAll, el.btnNew, el.btnSortDir, el.btnApplySort]) if (btn && btn !== button) btn.disabled = false;

}

async function copyText(text, title = '复制成功') {
  const value = String(text || '');
  if (!value) return notify('warn2', '没有可复制内容', '当前项目没有可复制的文本。');
  try {
    if (navigator.clipboard?.writeText) {
      try {
        await navigator.clipboard.writeText(value);
      } catch {
        copyTextFallback(value);
      }
    } else {
      copyTextFallback(value);
    }
    log(title, 'ok');
    notify('ok', title, '内容已复制到剪贴板。');
  } catch (e) {
    log(`复制失败：${e.message || e}`, 'bad2');
    notify('bad2', '复制失败', e.message || String(e));
  }
}

function copyTextFallback(value) {
  const textarea = document.createElement('textarea');
  textarea.value = value;
  textarea.setAttribute('readonly', '');
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  const copied = document.execCommand('copy');
  textarea.remove();
  if (!copied) throw new Error('浏览器拒绝了剪贴板访问');
}

async function reorderAccounts(fromKey, toKey, before) {
  const fromIndex = state.accounts.findIndex((acc) => accountKey(acc) === String(fromKey));
  const toIndex = state.accounts.findIndex((acc) => accountKey(acc) === String(toKey));
  if (fromIndex < 0 || toIndex < 0 || fromIndex === toIndex) return;
  state.sortField = 'manual';
  if (el.sortField) el.sortField.value = 'manual';
  const moved = state.accounts.splice(fromIndex, 1)[0];
  let insertIndex = toIndex;
  if (fromIndex < toIndex) insertIndex -= 1;
  if (!before) insertIndex += 1;
  state.accounts.splice(insertIndex, 0, moved);
  renderTable();
  renderDetail();
  try {
    await api('/api/accounts/reorder', {
      method: 'POST',
      body: JSON.stringify({ ordered_ids: state.accounts.map((acc) => Number(acc.account_index)) })
    });
    log('账号顺序已更新', 'ok');
    notify('ok', '排序已更新', '账号可上下拖动，序号已随之变化。');
    if (state.selected) state.selected = findAccountByKey(accountKey(state.selected));
  } catch (e) {
    log(`排序失败：${e.message}`, 'bad2');
    notify('bad2', '排序失败', e.message || String(e));
    await refreshAccounts();
  }
}

async function checkinOne(key) {
  const label = accountLabel(key);
  notify('warn2', '开始签到', `${label} 正在执行签到。`);
  const data = await api(`/api/accounts/${encodeURIComponent(key)}/checkin`, { method: 'POST', body: '{}' });
  state.checkinResults[key] = data.result;
  if (data.result.state === 'UNSUPPORTED') { markAccountSiteCheckinUnsupported(key); log(`${label} 所在网站不可签到`, 'warn2'); notify('warn2', '该网站不可签到', `${label}：${data.result.message || '网站未开启签到功能'}`); }
  else if (data.result.state === 'FAILED') { state.signinStatus[key] = '未签到'; log(`${label} 签到失败：${data.result.message || ''}`, 'bad2'); notify('bad2', '签到失败', `${label}：${data.result.message || '未知原因'}`); }

  else { state.signinStatus[key] = '已签到'; log(`${label} 签到成功`, 'ok'); notify('ok', '签到成功', `${label} 已成功签到。`); }
  return data.result;
}

async function statusOne(key) {

  const data = await api(`/api/accounts/${encodeURIComponent(key)}/status`, { method: 'POST', body: '{}' });

    log(`${label} 检测成功：额度=${formatMoney(quotaToMoney(q.quota, sys), sys)}，与上次相比=${formatMoney(quotaToMoney(dc.change_from_previous, sys), sys, true)}`, 'ok');

async function checkinAll() {
  notify('warn2', '开始全部签到', '仅处理今日状态为未签到的启用账号。');
  const data = await api('/api/accounts/checkin-all', { method: 'POST', body: '{}' });
  let okCount = 0, alreadyCount = 0, unsignedCount = 0, unsupportedCount = 0;
  for (const r of data.results || []) {
    const key = String(r.account_index || '');
    const label = accountLabel(key);
    state.checkinResults[key] = r;
    if (r.state === 'UNSUPPORTED') { markAccountSiteCheckinUnsupported(key); log(`${label} 所在网站不可签到`, 'warn2'); unsupportedCount += 1; }
    else if (r.state === 'FAILED') { state.signinStatus[key] = '未签到'; log(`${label} 签到失败：${r.message || ''}`, 'bad2'); unsignedCount += 1; }
    else if (r.state === 'ALREADY_SIGNED') { state.signinStatus[key] = '已签到'; log(`${label} 今日已签到`, 'warn2'); alreadyCount += 1; }
    else { state.signinStatus[key] = '已签到'; log(`${label} 签到成功`, 'ok'); okCount += 1; }
  }
  const skippedSigned = Number(data.skipped_signed || 0);
  const skippedUnsupported = Number(data.skipped_unsupported || 0);
  notify('ok', '全部签到完成', `执行 ${data.eligible_count || 0} 个：成功 ${okCount} 个，已签到 ${alreadyCount} 个，失败 ${unsignedCount} 个，不可签到 ${unsupportedCount} 个；跳过已签到 ${skippedSigned} 个、不可签到 ${skippedUnsupported} 个。`);
}

async function statusAll() {
  notify('warn2', '开始全部检测', '正在批量更新账号余额与状态。');
  const data = await api('/api/accounts/status-all', { method: 'POST', body: '{}' });
  state.systemStatus = data.system_status || state.systemStatus;
  let validCount = 0, failCount = 0;
  for (const r of data.results || []) {
    const key = String(r.account_index || '');
    const label = accountLabel(key);
    state.statusResults[key] = r;
    state.signinStatus[key] = r.signin_status;
    if (r.signin_status === '不可签到') markAccountSiteCheckinUnsupported(key);
    if (r.session_valid) { log(`${label} 检测成功`, 'ok'); validCount += 1; }
    else { log(`${label} 检测异常：${r.api_error || ''}`, 'warn2'); failCount += 1; }
  }
  notify('ok', '全部检测完成', `有效 ${validCount} 个，异常 ${failCount} 个。`);
}


async function runGroupCheckin(group) {
  if (isGroupCheckinUnsupported(group.accounts)) {
    notify('warn2', '该网站不可签到', `${group.baseUrl} 未开启签到功能。`);
    return;
  }
  const enabledAccounts = group.accounts.filter((acc) => acc.enabled);
  const accounts = enabledAccounts.filter((acc) => (state.signinStatus[accountKey(acc)] || acc.signin_status || '未签到') === '未签到');
  const skipped = enabledAccounts.length - accounts.length;
  if (!accounts.length) {
    notify('ok', '无需签到', `${group.baseUrl} 没有状态为未签到的启用账号。`);
    return;
  }
  notify('warn2', '开始地址签到', `${group.baseUrl}：执行 ${accounts.length} 个未签到账号，跳过 ${skipped} 个。`);
  for (const acc of accounts) {
    const key = accountKey(acc);
    await withAccountBusy(key, 'checkin', () => checkinOne(key));
    if (isGroupCheckinUnsupported(group.accounts)) break;
  }
  renderTable();
  renderDetail();
  notify('ok', '地址签到完成', `${group.baseUrl} 已完成 ${accounts.length} 个未签到账号，跳过 ${skipped} 个。`);
}

async function runGroupStatus(group) {
  const accounts = group.accounts.filter((acc) => acc.enabled);
  notify('warn2', '开始地址检测', `${group.baseUrl}：共 ${accounts.length} 个启用账号。`);
  for (const acc of accounts) {
    const key = accountKey(acc);
    await withAccountBusy(key, 'status', () => statusOne(key));
  }
  renderTable();
  renderDetail();
  notify('ok', '地址检测完成', `${group.baseUrl} 已执行完成。`);
}

function compareAccountsForSort(a, b, indexMap) {
  const dir = state.sortDir === 'asc' ? 1 : -1;
  if (state.sortField === 'new_api_user') {
    const av = Number(a.new_api_user);
    const bv = Number(b.new_api_user);
    const aOk = Number.isFinite(av);
    const bOk = Number.isFinite(bv);
    if (aOk && bOk && av !== bv) return (av - bv) * dir;
    if (aOk !== bOk) return aOk ? -1 : 1;
  }
  if (state.sortField === 'quota') {
    const av = getAccountQuotaMoney(a);
    const bv = getAccountQuotaMoney(b);
    const aOk = Number.isFinite(av);
    const bOk = Number.isFinite(bv);
    if (aOk && bOk && av !== bv) return (av - bv) * dir;
    if (aOk !== bOk) return aOk ? -1 : 1;
  }
  return (indexMap.get(accountKey(a)) || 0) - (indexMap.get(accountKey(b)) || 0);
}

async function applyTopSort() {
  state.sortField = el.sortField.value || 'manual';
  if (state.sortField === 'manual') {
    notify('warn2', '请选择排序字段', '可以选择 new_api_user 或额度进行排序。');
    return;
  }
  if (state.sortField === 'quota' && !state.accounts.some((acc) => Number.isFinite(getAccountQuotaMoney(acc)))) {
    notify('warn2', '缺少额度数据', '请先执行全部检测或单账号检测，再按额度排序。');
    return;
  }
  const indexMap = new Map(state.accounts.map((acc, index) => [accountKey(acc), index]));
  state.accounts = [...state.accounts].sort((a, b) => compareAccountsForSort(a, b, indexMap));
  renderTable();
  try {
    await api('/api/accounts/reorder', {
      method: 'POST',
      body: JSON.stringify({ ordered_ids: state.accounts.map((acc) => Number(acc.account_index)) })
    });
    const label = state.sortField === 'quota' ? '额度' : 'new_api_user';
    notify('ok', '排序已更新', `${label} 已按${state.sortDir === 'asc' ? '升序' : '降序'}排列。`);
    log(`排序已更新：${label} ${state.sortDir === 'asc' ? '升序' : '降序'}`, 'ok');
  } catch (e) {
    notify('bad2', '排序失败', e.message || String(e));
    log(`排序失败：${e.message || e}`, 'bad2');
    await refreshAccounts();
  }
}

}
document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('.combo-wrap')) hideComboLists();
});
bindBaseUrlNormalizer(el.fBaseUrl);
bindBaseUrlNormalizer(el.mBaseUrl);
bindProviderCombo(el.fProvider);
bindProviderCombo(el.mProvider);

updateProviderHints('edit');
updateProviderHints('modal');
fillForm(null);
refreshAccounts()
  .then(() => {
    log('页面已就绪', 'ok');
    notify('ok', '页面已就绪', '可以直接选择账号、拖动排序、签到或检测余额变化。');
  })
  .catch(e => log(e.message, 'bad2'));
</script>
